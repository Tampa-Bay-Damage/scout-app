<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="NXL Scout">
<title>NXL Scout</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:Arial,sans-serif;font-size:13px;background:#f0f0f0;color:#000}

/* SETUP */
#setup{padding:20px;max-width:500px;margin:0 auto}
#setup h1{font-size:22px;font-weight:bold;text-align:center;margin-bottom:2px}
#setup h2{font-size:12px;text-align:center;color:#666;margin-bottom:20px;letter-spacing:2px}
.fg{margin-bottom:12px}
.fg label{display:block;font-weight:bold;font-size:12px;margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;padding:8px;border:1px solid #999;border-radius:3px;font-family:Arial,sans-serif;font-size:13px;background:#fff}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.side-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.side-btn{padding:12px;border:2px solid #ccc;border-radius:3px;background:#fff;font-size:14px;font-weight:bold;cursor:pointer;text-align:center;font-family:Arial,sans-serif}
.side-btn.red.active{border-color:#c00;background:#fff0f0;color:#c00}
.side-btn.blue.active{border-color:#00c;background:#f0f0ff;color:#00c}
.start-btn{width:100%;padding:12px;background:#1a1a2e;color:#fff;border:none;border-radius:3px;font-size:15px;font-weight:bold;cursor:pointer;margin-top:8px;font-family:Arial,sans-serif}
.hint{font-size:11px;color:#666;margin-top:4px}
.id-row{display:flex;gap:8px}
.id-row input{flex:1;padding:8px;border:1px solid #999;border-radius:3px;font-size:13px}
.id-row button{padding:8px 12px;border:1px solid #999;border-radius:3px;background:#f5f5f5;font-size:12px;font-weight:bold;cursor:pointer}

/* APP */
#app{display:none;flex-direction:column;height:100vh;overflow:hidden}
.mhdr{background:#1a1a2e;color:#fff;padding:6px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mhdr-l{font-size:12px;font-weight:bold;letter-spacing:1px}
.mhdr-c{font-size:13px;font-weight:bold;text-align:center}
.mhdr-r{font-size:11px;color:#bbb;text-align:right}
.scoreboard{background:#fff;border-bottom:2px solid #1a1a2e;padding:6px 10px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;flex-shrink:0}
.ss-red .tn{color:#c00;font-weight:bold;font-size:12px}
.ss-red .sc{font-size:30px;font-weight:bold;color:#c00;line-height:1}
.ss-blue .tn{color:#00c;font-weight:bold;font-size:12px;text-align:right}
.ss-blue .sc{font-size:30px;font-weight:bold;color:#00c;line-height:1;text-align:right}
.vs{font-size:14px;font-weight:bold;color:#666;text-align:center}
.twrap{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;background:#fff}
table{border-collapse:collapse;width:max-content;min-width:100%}
th,td{border:1px solid #bbb;text-align:center;vertical-align:middle;white-space:nowrap;font-family:Arial,sans-serif;font-size:12px}
.rh1 th{background:#1a1a2e;color:#fff;padding:4px 6px;font-size:12px;font-weight:bold;position:sticky;top:0;z-index:10}
.rh2 th{background:#d0d8e8;padding:3px 4px;font-size:10px;font-weight:bold;position:sticky;top:24px;z-index:10}
.rh3 th{background:#e8e8e8;padding:3px 4px;font-size:11px;font-weight:bold;position:sticky;top:46px;z-index:10}
.rh3 th.rh{background:#ffd0d0;color:#c00}
.rh3 th.bh{background:#d0d0ff;color:#00c}
tr.red-row{background:#fff8f8}
tr.blue-row{background:#f8f8ff}
tr.sec-lbl td{background:#f0f0f0;font-weight:bold;font-size:11px;padding:3px 8px;text-align:left;border-top:2px solid #999}
tr.sec-lbl.red td{background:#ffe0e0;color:#c00;border-top-color:#c00}
tr.sec-lbl.blue td{background:#e0e0ff;color:#00c;border-top-color:#00c}
td.cpt{min-width:30px;padding:2px 4px;background:#f5f5f5;font-weight:bold;color:#555}
td.cwl{min-width:36px;height:32px;cursor:pointer;font-weight:bold;font-size:13px}
td.cwl.W{background:#d4edda;color:#155724}
td.cwl.L{background:#f8d7da;color:#721c24}
td.crb{min-width:44px;height:32px;cursor:pointer;font-weight:bold;font-size:12px}
td.crb.Red{background:#ffe0e0;color:#c00}
td.crb.Blue{background:#e0e0ff;color:#00c}
td.csc{min-width:36px;padding:2px 4px;font-weight:bold}
td.ctm{min-width:52px;height:32px;cursor:pointer;color:#333;font-size:11px}
td.bk{min-width:48px;height:32px;cursor:pointer;font-size:12px;font-weight:bold;padding:2px}
td.bk.hasO{background:#f8d7da;color:#c00}
td.bk.hasS{background:#d4edda;color:#155724}
td.bk.hasX{background:#fff3cd;color:#856404}
td.bk.ro{cursor:default;color:#555}
td.cno{min-width:120px;padding:0}
td.cno input{width:100%;height:32px;border:none;padding:4px 6px;font-family:Arial,sans-serif;font-size:11px;background:transparent;outline:none}
td.cno input.ro{color:#555;pointer-events:none}
.addwrap{background:#f0f0f0;border-top:1px solid #ccc;padding:6px 10px;display:flex;gap:8px;flex-shrink:0}
.abtn{flex:1;padding:8px;border:1px solid #999;border-radius:3px;background:#fff;font-family:Arial,sans-serif;font-size:12px;font-weight:bold;cursor:pointer}
.abtn.red{border-color:#c00;color:#c00;background:#fff8f8}
.abtn.blue{border-color:#00c;color:#00c;background:#f8f8ff}
.sbar{background:#e8e8e8;border-top:1px solid #ccc;padding:4px 10px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;font-size:11px;color:#555}
.sdot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#28a745;margin-right:5px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
tr.keyrow td{background:#fffde7;font-size:10px;padding:3px 6px;text-align:left;color:#555;border-top:1px solid #e0e0e0}

/* POPUP */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center}
.ov.open{display:flex}
.pbox{background:#fff;border-top:3px solid #1a1a2e;border-radius:8px 8px 0 0;padding:16px 16px 32px;width:100%;max-width:480px;animation:up .18s ease}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.ptitle{font-weight:bold;font-size:14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.pcls{background:#eee;border:1px solid #ccc;border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.sbtn{padding:12px 6px;border:2px solid #ccc;border-radius:4px;background:#fff;font-family:Arial,sans-serif;font-size:16px;font-weight:bold;cursor:pointer;text-align:center}
.sbtn .sl{display:block;font-size:9px;font-weight:normal;color:#666;margin-top:2px}
.sbtn.sel{border-color:#1a1a2e;background:#e8ecf8;color:#1a1a2e}
.prev{background:#f5f5f5;border:1px solid #ccc;border-radius:3px;padding:8px 10px;margin-bottom:12px;font-size:13px;display:flex;gap:10px;align-items:center}
.prev strong{font-size:18px;font-weight:bold;flex:1}
.prev span{font-size:11px;color:#888;cursor:pointer}
.pbtns{display:grid;grid-template-columns:1fr 2fr;gap:8px}
.bcancel{padding:10px;border:1px solid #999;border-radius:3px;background:#fff;font-family:Arial,sans-serif;font-size:13px;cursor:pointer}
.bapply{padding:10px;border:none;border-radius:3px;background:#1a1a2e;color:#fff;font-family:Arial,sans-serif;font-size:13px;font-weight:bold;cursor:pointer}
.tdisp{font-size:56px;font-weight:bold;text-align:center;margin:12px 0;font-family:‘Courier New’,monospace;color:#1a1a2e}
.tpre{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.tpre button{padding:8px;border:1px solid #ccc;border-radius:3px;background:#f5f5f5;font-family:Arial,sans-serif;font-size:12px;font-weight:bold;cursor:pointer}
.tctrl{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.tctrl button{padding:10px;border:1px solid #ccc;border-radius:3px;font-family:Arial,sans-serif;font-size:13px;font-weight:bold;cursor:pointer}
.tstart{background:#d4edda;border-color:#28a745!important;color:#155724}
.tstop{background:#f8d7da;border-color:#dc3545!important;color:#721c24}
.treset{background:#f5f5f5}
</style>

</head>
<body>

<div id="setup">
  <h1>NXL SCOUTING</h1>
  <h2>2026 SEASON</h2>
  <div class="fg">
    <label>Firebase Config (paste once)</label>
    <textarea id="fbcfg" rows="4" placeholder='{"apiKey":"...","authDomain":"...","projectId":"...","storageBucket":"...","messagingSenderId":"...","appId":"..."}'></textarea>
  </div>
  <div class="row2">
    <div class="fg">
      <label>Day</label>
      <select id="sday"><option value="">Select...</option><option>Friday</option><option>Saturday</option><option>Sunday</option></select>
    </div>
    <div class="fg">
      <label>Match #</label>
      <input id="smatch" type="number" placeholder="1" min="1" max="20">
    </div>
  </div>
  <div class="fg"><label>Red Team</label><select id="sred"><option value="">Select team...</option></select></div>
  <div class="fg"><label>Blue Team</label><select id="sblue"><option value="">Select team...</option></select></div>
  <div class="fg">
    <label>You are scouting</label>
    <div class="side-row">
      <button class="side-btn red" id="sbnr" onclick="selSide('red')">RED SIDE</button>
      <button class="side-btn blue" id="sbnb" onclick="selSide('blue')">BLUE SIDE</button>
    </div>
  </div>
  <div class="fg">
    <label>Match ID <span style="font-weight:normal;color:#666">(both scouts must use same ID)</span></label>
    <div class="id-row">
      <input id="smid" placeholder="e.g. fri-01">
      <button onclick="genId()">AUTO</button>
    </div>
    <div class="hint">Share this with your partner before starting.</div>
  </div>
  <button class="start-btn" onclick="go()">START SCOUTING</button>
</div>

<div id="app">
  <div class="mhdr">
    <div class="mhdr-l">NXL 2026</div>
    <div class="mhdr-c" id="hc">Match 1 — Friday</div>
    <div class="mhdr-r" id="hr">RED SIDE</div>
  </div>
  <div class="scoreboard">
    <div class="ss-red"><div class="tn" id="rname">Red</div><div class="sc" id="rscore">0</div></div>
    <div class="vs">VS</div>
    <div class="ss-blue"><div class="tn" id="bname">Blue</div><div class="sc" id="bscore">0</div></div>
  </div>
  <div class="twrap"><table id="tbl"><thead id="thead"></thead><tbody id="tbody"></tbody></table></div>
  <div class="addwrap">
    <button class="abtn red" id="addr" onclick="addPt('red')">+ ADD RED POINT</button>
    <button class="abtn blue" id="addb" onclick="addPt('blue')">+ ADD BLUE POINT</button>
  </div>
  <div class="sbar">
    <div><span class="sdot"></span><span id="sst">Connecting...</span></div>
    <div id="sside" style="font-weight:bold"></div>
  </div>
</div>

<div class="ov" id="symo">
  <div class="pbox">
    <div class="ptitle">
      <span>Pt <span id="ppt"></span> — <span id="pbk"></span></span>
      <button class="pcls" onclick="closeSym()">x</button>
    </div>
    <div class="sgrid" id="sgrid"></div>
    <div class="prev">
      <span style="color:#555;font-size:12px">Entry:</span>
      <strong id="pval">-</strong>
      <span onclick="clrSym()">Clear</span>
    </div>
    <div class="pbtns">
      <button class="bcancel" onclick="closeSym()">Cancel</button>
      <button class="bapply" onclick="applySym()">APPLY</button>
    </div>
  </div>
</div>

<div class="ov" id="timo">
  <div class="pbox">
    <div class="ptitle">
      <span>Point Timer</span>
      <button class="pcls" onclick="closeTim()">x</button>
    </div>
    <div class="tdisp" id="tdisp">3:00</div>
    <div class="tpre">
      <button onclick="setTim(180)">3:00</button>
      <button onclick="setTim(150)">2:30</button>
      <button onclick="setTim(120)">2:00</button>
      <button onclick="setTim(90)">1:30</button>
    </div>
    <div class="tctrl">
      <button class="tstart" onclick="startTim()">START</button>
      <button class="tstop" onclick="stopTim()">STOP</button>
      <button class="treset" onclick="resetTim()">RESET</button>
    </div>
    <div class="pbtns">
      <button class="bcancel" onclick="closeTim()">Cancel</button>
      <button class="bapply" onclick="saveTim()">SAVE TIME</button>
    </div>
  </div>
</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getDatabase,ref,set,onValue}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const TEAMS=["Atlanta Jungle Cats","Chicago Aftershock","Chicago Wyldside Distortion","CK Hurricanes","Detroit Infamous","Edmonton Impact","Houston Heat","Los Angeles Collision","Los Angeles Ironmen","New Jersey Leverage","New York Xtreme","PaintballFIT","Perris ASG Aftermath","Red Legion","Royal City Seadogs","San Antonio X-Factor","San Diego Dynasty","Seattle Uprising","Tampa Bay Damage","TonTon Arsenal"];
const BKS=["S1","Tequila","Seattle","SC","Alpha","Xbox","Sniper","HS","H∆","Dagger","Florida","Dallas","Baby","Beast","100","200","300"];
const SYMS=[{s:"_",l:"Not Used"},{s:"O",l:"Dead"},{s:"S",l:"Snake"},{s:"∆",l:"Dorito"},{s:"X",l:"Dived"},{s:"S∆",l:"Sn+Dor"},{s:"^",l:"Shallow"},{s:"v",l:"Deep"}];

let db=null,mid='',mside='',rteam='',bteam='',mday='',mnum='';
let pts={red:[],blue:[]};
let aCell=null,selS=[];
let tsecs=180,trun=false,tint=null,atCell=null;

// populate teams
['sred','sblue'].forEach(id=>{
  const sel=document.getElementById(id);
  TEAMS.forEach(t=>{const o=document.createElement('option');o.value=o.textContent=t;sel.appendChild(o);});
});

const saved=localStorage.getItem('nxl-fb');
if(saved)document.getElementById('fbcfg').value=saved;

window.selSide=s=>{
  mside=s;
  document.getElementById('sbnr').classList.toggle('active',s==='red');
  document.getElementById('sbnb').classList.toggle('active',s==='blue');
};

window.genId=()=>{
  const d=document.getElementById('sday').value||'fri';
  const n=document.getElementById('smatch').value||'1';
  document.getElementById('smid').value=`${d.slice(0,3).toLowerCase()}-${String(n).padStart(2,'0')}`;
};

window.go=async()=>{
  mday=document.getElementById('sday').value;
  mnum=document.getElementById('smatch').value;
  rteam=document.getElementById('sred').value;
  bteam=document.getElementById('sblue').value;
  mid=document.getElementById('smid').value.trim();
  const cfgRaw=document.getElementById('fbcfg').value.trim();
  if(!mday||!mnum||!rteam||!bteam||!mside||!mid){alert('Please fill all fields.');return;}
  if(!cfgRaw){alert('Please paste Firebase config.');return;}
  let cfg;
  try{cfg=JSON.parse(cfgRaw);}catch{alert('Invalid Firebase JSON.');return;}
  localStorage.setItem('nxl-fb',cfgRaw);
  try{const app=initializeApp(cfg,mid+Date.now());db=getDatabase(app);}
  catch(e){alert('Firebase: '+e.message);return;}
  document.getElementById('setup').style.display='none';
  const appEl=document.getElementById('app');appEl.style.display='flex';
  document.getElementById('hc').textContent=`Match ${mnum} — ${mday}`;
  document.getElementById('hr').textContent=`SCOUTING: ${mside.toUpperCase()}`;
  document.getElementById('rname').textContent=rteam;
  document.getElementById('bname').textContent=bteam;
  document.getElementById('sside').textContent=mside.toUpperCase()+' SIDE';
  document.getElementById('addr').style.display=mside==='red'?'':'none';
  document.getElementById('addb').style.display=mside==='blue'?'':'none';
  buildHead();
  listen();
};

function buildHead(){
  const th=document.getElementById('thead');
  th.innerHTML='';
  // Row 1
  const r1=document.createElement('tr');r1.className='rh1';
  [['NXL',1],['Team',1],[rteam,BKS.length+4],['Day',1],[mday,1]].forEach(([t,c])=>{
    const e=document.createElement('th');e.textContent=t;e.colSpan=c;r1.appendChild(e);
  });
  th.appendChild(r1);
  // Row 2 - shapes row (simplified)
  const r2=document.createElement('tr');r2.className='rh2';
  ['#','R/B','Score','Time',...BKS.map(()=>''),'Notes'].forEach(t=>{
    const e=document.createElement('th');e.textContent=t;r2.appendChild(e);
  });
  th.appendChild(r2);
  // Row 3 - bunker names
  const r3=document.createElement('tr');r3.className='rh3';
  ['*','R/B','Score','Time',...BKS,'Notes'].forEach((t,i)=>{
    const e=document.createElement('th');e.textContent=t;
    if(i>=4&&i<4+BKS.length)e.classList.add(mside==='red'?'rh':'bh');
    r3.appendChild(e);
  });
  th.appendChild(r3);
}

function listen(){
  onValue(ref(db,`matches/${mid}`),snap=>{
    const d=snap.val()||{};
    pts.red=d.red||[];pts.blue=d.blue||[];
    render();updateScore();
    document.getElementById('sst').textContent='Live — Synced';
  });
}

function save(){if(!db)return;set(ref(db,`matches/${mid}/${mside}`),pts[mside]);}

window.addPt=side=>{
  const pt={wl:'',rb:side==='red'?'Red':'Blue',time:'',notes:''};
  BKS.forEach(b=>pt[b]='');
  pts[side].push(pt);save();
};

function render(){
  const tb=document.getElementById('tbody');tb.innerHTML='';
  ['red','blue'].forEach(side=>{
    const mine=side===mside;
    const tname=side==='red'?rteam:bteam;
    // section label
    const lr=document.createElement('tr');lr.className=`sec-lbl ${side}`;
    const ltd=document.createElement('td');ltd.colSpan=5+BKS.length+1;ltd.textContent=tname;
    lr.appendChild(ltd);tb.appendChild(lr);
    pts[side].forEach((pt,i)=>{
      const tr=document.createElement('tr');tr.className=`${side}-row`;
      // pt#
      const td0=document.createElement('td');td0.className='cpt';td0.textContent=i+1;tr.appendChild(td0);
      // W/L
      const td1=document.createElement('td');td1.className=`cwl ${pt.wl||''}`;td1.textContent=pt.wl||'';
      if(mine)td1.onclick=()=>{cycleWL(side,i);};tr.appendChild(td1);
      // R/B
      const td2=document.createElement('td');td2.className=`crb ${pt.rb||''}`;td2.textContent=pt.rb||'';
      if(mine)td2.onclick=()=>{cycleRB(side,i);};tr.appendChild(td2);
      // Score
      const td3=document.createElement('td');td3.className='csc';td3.textContent=runSc(side,i);tr.appendChild(td3);
      // Time
      const td4=document.createElement('td');td4.className='ctm';td4.textContent=pt.time||'—';
      if(mine)td4.onclick=()=>openTim(side,i);tr.appendChild(td4);
      // Bunkers
      BKS.forEach(b=>{
        const tdb=document.createElement('td');
        const v=pt[b]||'';
        tdb.className=`bk ${v.includes('O')?'hasO':v.includes('S')?'hasS':v.includes('X')?'hasX':''} ${!mine?'ro':''}`;
        tdb.textContent=v;
        if(mine)tdb.onclick=()=>openSym(side,i,b,v);
        tr.appendChild(tdb);
      });
      // Notes
      const tdn=document.createElement('td');tdn.className='cno';
      const inp=document.createElement('input');inp.type='text';inp.value=pt.notes||'';
      inp.placeholder=mine?'notes...':'';
      if(!mine)inp.className='ro';
      else inp.oninput=e=>{pts[side][i].notes=e.target.value;save();};
      tdn.appendChild(inp);tr.appendChild(tdn);
      tb.appendChild(tr);
    });
    if(pts[side].length===0){
      const er=document.createElement('tr');const et=document.createElement('td');
      et.colSpan=5+BKS.length+1;
      et.style.cssText='padding:10px;color:#999;font-style:italic;text-align:center';
      et.textContent=mine?'Tap "+ ADD POINT" to start':'Waiting for partner...';
      er.appendChild(et);tb.appendChild(er);
    }
  });
  // Key
  const kr=document.createElement('tr');kr.className='keyrow';
  const kt=document.createElement('td');kt.colSpan=5+BKS.length+1;
  kt.textContent='Key:  O=Dead  S=Snake  ∆=Dorito  X=Dived  S∆=Snake+Dorito  ^=Shallow  v=Deep  _=Not Used';
  kr.appendChild(kt);tb.appendChild(kr);
}

function runSc(side,up){let s=0;for(let i=0;i<=up;i++)if(pts[side][i]?.wl==='W')s++;return s;}
function updateScore(){
  document.getElementById('rscore').textContent=pts.red.filter(p=>p.wl==='W').length;
  document.getElementById('bscore').textContent=pts.blue.filter(p=>p.wl==='W').length;
}
function cycleWL(side,i){const c=pts[side][i].wl;pts[side][i].wl=c===''?'W':c==='W'?'L':'';save();}
function cycleRB(side,i){pts[side][i].rb=pts[side][i].rb==='Red'?'Blue':'Red';save();}

// Symbol popup
function openSym(side,i,bk,cur){
  aCell={side,i,bk};
  selS=cur&&cur!==''?(cur==='S∆'?['S∆']:cur.split('')):[];
  document.getElementById('ppt').textContent=i+1;
  document.getElementById('pbk').textContent=bk;
  buildSGrid();updPrev();
  document.getElementById('symo').classList.add('open');
}
function buildSGrid(){
  const g=document.getElementById('sgrid');g.innerHTML='';
  SYMS.forEach(({s,l})=>{
    const b=document.createElement('button');b.className=`sbtn ${selS.includes(s)?'sel':''}`;
    b.innerHTML=`${s}<span class="sl">${l}</span>`;b.onclick=()=>togSym(s);g.appendChild(b);
  });
}
function togSym(s){
  if(s==='_'){selS=['_'];buildSGrid();updPrev();return;}
  selS=selS.filter(x=>x!=='_');
  const i=selS.indexOf(s);if(i>=0)selS.splice(i,1);else selS.push(s);
  buildSGrid();updPrev();
}
function updPrev(){document.getElementById('pval').textContent=selS.join('')||'—';}
window.clrSym=()=>{selS=[];buildSGrid();updPrev();};
window.closeSym=()=>{document.getElementById('symo').classList.remove('open');aCell=null;selS=[];};
window.applySym=()=>{
  if(!aCell)return;
  const{side,i,bk}=aCell;pts[side][i][bk]=selS.join('');save();closeSym();
};

// Timer
function openTim(side,i){
  atCell={side,i};tsecs=180;trun=false;clearInterval(tint);updTim();
  document.getElementById('timo').classList.add('open');
}
window.closeTim=()=>{stopTim();document.getElementById('timo').classList.remove('open');atCell=null;};
window.setTim=s=>{stopTim();tsecs=s;updTim();};
window.startTim=()=>{if(trun)return;trun=true;tint=setInterval(()=>{if(tsecs>0){tsecs--;updTim();}else stopTim();},1000);};
window.stopTim=()=>{trun=false;clearInterval(tint);};
window.resetTim=()=>{stopTim();tsecs=180;updTim();};
window.saveTim=()=>{
  if(!atCell)return;
  const{side,i}=atCell;
  const m=Math.floor(tsecs/60),s=String(tsecs%60).padStart(2,'0');
  pts[side][i].time=`${m}:${s}`;save();closeTim();
};
function updTim(){const m=Math.floor(tsecs/60),s=String(tsecs%60).padStart(2,'0');document.getElementById('tdisp').textContent=`${m}:${s}`;}

// Close on overlay click
document.getElementById('symo').addEventListener('click',e=>{if(e.target.id==='symo')closeSym();});
document.getElementById('timo').addEventListener('click',e=>{if(e.target.id==='timo')closeTim();});
</script>

</body>
