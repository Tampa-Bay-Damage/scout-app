const BKS=["SOB","Seattle","SC","Alpha","Xbox","Sniper","HS","H\u2206","Dagger","Florida","Dallas","Whiskey","Baby","Beast","100","200","300"];

// ── MIGRATION: S1 → SOB ──────────────────────
async function migrateS1toSOB(){
  if(!db) return;
  const flagSnap=await db.ref(`sessions/${SESSION}/_migrated_s1_to_sob`).once('value');
  if(flagSnap.val()) return; // already done
  const snap=await db.ref(`sessions/${SESSION}`).once('value');
  const d=snap.val()||{};
  const updates={};
  TABS.forEach(t=>{
    if(t.id==='stats'||t.id==='rosters') return;
    const td=d[t.id];if(!td) return;
    ['m1','m2'].forEach(mk=>{
      const md=td[mk];if(!md) return;
      ['t1pts','t2pts'].forEach(tk=>{
        const pts=md[tk];if(!pts) return;
        Object.keys(pts).forEach(i=>{
          const pt=pts[i];if(!pt) return;
          // Migrate S1 → SOB
          if(pt.S1!==undefined){
            updates[`sessions/${SESSION}/${t.id}/${mk}/${tk}/${i}/SOB`]=pt.S1;
            updates[`sessions/${SESSION}/${t.id}/${mk}/${tk}/${i}/S1`]=null;
          }
          // Migrate Tequila moves into SOB array if they exist
          if(pt.Tequila!==undefined&&pt.Tequila!==null){
            const existing=pt.SOB||pt.S1||[];
            const tequilaMoves=Array.isArray(pt.Tequila)?pt.Tequila:Object.values(pt.Tequila||{});
            if(tequilaMoves.length>0){
              const combined=[...(Array.isArray(existing)?existing:Object.values(existing||{})),...tequilaMoves];
              updates[`sessions/${SESSION}/${t.id}/${mk}/${tk}/${i}/SOB`]=combined;
            }
            updates[`sessions/${SESSION}/${t.id}/${mk}/${tk}/${i}/Tequila`]=null;
          }
        });
      });
    });
  });
  updates[`sessions/${SESSION}/_migrated_s1_to_sob`]=true;
  if(Object.keys(updates).length>1){
    await db.ref().update(updates);
    console.log('Migration S1→SOB complete');
  } else {
    await db.ref(`sessions/${SESSION}/_migrated_s1_to_sob`).set(true);
  }
}

migrateS1toSOB().then(()=>{
  buildTabs();
  createPanels();
  listenFirebase();
  loadRosters();
  showTab('stats');
});

// ── TABS ─────────────────────────────────────
function buildTabs(){
  const bar=document.getElementById('tabbar');bar.innerHTML='';
  TABS.forEach(t=>{
    const el=document.createElement('div');
    el.className=`tab ${t.day} ${t.id==='stats'?'stats-tab':''}`;
    el.textContent=t.label;el.id='tab-'+t.id;
    el.onclick=()=>showTab(t.id);bar.appendChild(el);
  });
}

function createPanels(){
  const wrap=document.getElementById('sheetwrap');
  TABS.forEach(t=>{
    const panel=document.createElement('div');
    panel.className='tab-panel';
    panel.id='panel-'+t.id;
    wrap.appendChild(panel);
  });
}

function showTab(id){
  TABS.forEach(t=>{
    const e=document.getElementById('tab-'+t.id);
    if(e) e.classList.toggle('active',t.id===id);
  });
  if(activeTab!==id){
    const oldPanel=document.getElementById('panel-'+activeTab);
    if(oldPanel) oldPanel.classList.remove('active');
  }
  activeTab=id;
  const panel=document.getElementById('panel-'+id);
  if(panel) panel.classList.add('active');
  if(!panelBuilt[id]){
    initTab(id);
    renderIntoPanel(id);
    panelBuilt[id]=true;
    panelDirty[id]=false;
  } else if(panelDirty[id]){
    renderIntoPanel(id);
    panelDirty[id]=false;
  }
  updateScoreBar();
}

// ── FIREBASE ─────────────────────────────────
function listenFirebase(){
  db.ref(`sessions/${SESSION}`).on('value',snap=>{
    const d=snap.val()||{};
    TABS.forEach(t=>{
      if(t.id==='stats'||t.id==='rosters') return;
      if(d[t.id]){
        data[t.id]=normalizeTab(JSON.parse(JSON.stringify(d[t.id])));
      } else {
        initTab(t.id);
        saveTab(t.id);
      }
      panelDirty[t.id]=true;
    });
    panelBuilt['stats']=false;
    if(!popCell){
      panelBuilt[activeTab]=false;
      showTab(activeTab);
    } else if(activeTab==='stats'){
      renderIntoPanel('stats');
    }
    updateScoreBar();
    document.getElementById('sst').textContent='Live \u2014 Synced';
  });
}

function initTab(id){
  if(data[id]) return;
  data[id]={
    m1:{t1name:'',t2name:'',t1pts:blankPts(),t2pts:blankPts()},
    m2:{t1name:'',t2name:'',t1pts:blankPts(),t2pts:blankPts()}
  };
}

function migrateMv(mv){
  if(!mv) return mv;
  if(mv.sym&&mv.sym.startsWith('O')&&!mv.isDead){
    return {...mv, isDead:true, sym:mv.sym.replace(/^O/,'')};
  }
  return mv;
}

function normalizePt(pt){
  const out={wl:pt.wl||'',rb:pt.rb||'',time:pt.time||'',notes:pt.notes||''};
  BKS.forEach(b=>{
    // Handle legacy S1 key mapping to SOB
    const val=b==='SOB'?(pt.SOB||pt.S1):pt[b];
    if(!val||val==='') out[b]=[];
    else if(typeof val==='string') out[b]=[migrateMv({sym:val,order:'primary',pen:'none'})];
    else if(Array.isArray(val)) out[b]=val.map(mv=>migrateMv(mv));
    else if(typeof val==='object') out[b]=Object.values(val).map(mv=>migrateMv(mv));
    else out[b]=[];
  });
  return out;
}

function normalizeTab(tabData){
  if(!tabData) return null;
  ['m1','m2'].forEach(mk=>{
    if(!tabData[mk]) return;
    ['t1pts','t2pts'].forEach(tk=>{
      if(!tabData[mk][tk]) return;
      tabData[mk][tk]=tabData[mk][tk].map(pt=>normalizePt(pt));
    });
  });
  return tabData;
}

function blankPts(){
  return Array.from({length:PTS},()=>{
    const p={wl:'',rb:'',time:'',notes:''};
    BKS.forEach(b=>p[b]=[]);
    return p;
  });
}

function saveTab(id){if(db) db.ref(`sessions/${SESSION}/${id}`).set(data[id]);}

// ── SCORE BAR ─────────────────────────────────
function updateScoreBar(){
  const bar=document.getElementById('scorebar');
  if(activeTab==='stats'){bar.innerHTML='<span style="color:#888;font-size:11px">Event Stats</span>';return;}
  const td=data[activeTab];if(!td){bar.innerHTML='';return;}
  const sc=(mk,tk)=>{const pts=data[activeTab][mk][tk]||[];return pts.filter(p=>p.wl==='W').length+'-'+pts.filter(p=>p.wl==='L').length;};
  bar.innerHTML=`
    <span class="sc-lbl">M1:</span>
    <span class="sc-red">${td.m1.t1name||'Top Team'} ${sc('m1','t1pts')}</span>
    <span class="sc-lbl">vs</span>
    <span class="sc-blue">${td.m1.t2name||'Bot Team'} ${sc('m1','t2pts')}</span>
    &nbsp;
    <span class="sc-lbl">M2:</span>
    <span class="sc-red">${td.m2.t1name||'Top Team'} ${sc('m2','t1pts')}</span>
    <span class="sc-lbl">vs</span>
    <span class="sc-blue">${td.m2.t2name||'Bot Team'} ${sc('m2','t2pts')}</span>
  `;
}

// ── RENDER INTO PANEL ──────────────────────────
function renderIntoPanel(tabId){
  const panel=document.getElementById('panel-'+tabId);
  if(!panel) return;
  panel.innerHTML='';
  if(tabId==='stats'){renderStats(panel);return;}
  if(tabId==='rosters'){renderRosters(panel);return;}
  initTab(tabId);
  const td=data[tabId];

  function makeMatchTable(mk,matchLabel){
    const tbl=document.createElement('table');
    const thead=document.createElement('thead');
    const tbody=document.createElement('tbody');
    const r1=document.createElement('tr');r1.className='hr1';
    const thLabel=document.createElement('th');thLabel.textContent=matchLabel;thLabel.colSpan=5;r1.appendChild(thLabel);
    BKS.forEach(()=>{const th=document.createElement('th');r1.appendChild(th);});
    const thNotes1=document.createElement('th');thNotes1.textContent='';r1.appendChild(thNotes1);
    thead.appendChild(r1);
    const r2=document.createElement('tr');r2.className='hr2';
    ['','Shapes','','','',...SHAPES,''].forEach(t=>{
      const th=document.createElement('th');th.textContent=t;r2.appendChild(th);
    });
    thead.appendChild(r2);
    const r3=document.createElement('tr');r3.className='hr3';
    const BK_DARK=['SOB','Alpha','HS','H\u2206','Baby','100'];
    const BK_MED=['SC','Beast'];
    const BK_LITE=['Sniper','Dagger'];
    ['*','W/L','R/B','Score','Time',...BKS.map(b=>b==='S1'?'SOB':b),'Notes'].forEach((t,i)=>{
      const th=document.createElement('th');th.textContent=t;
      if(i>=5&&i<5+BKS.length){
        const b=BKS[i-5];
        if(BK_DARK.includes(b))th.classList.add('bk-dark');
        else if(BK_MED.includes(b))th.classList.add('bk-med');
        else if(BK_LITE.includes(b))th.classList.add('bk-lite');
        else th.classList.add('bk');
      }
      r3.appendChild(th);
    });
    thead.appendChild(r3);
    tbl.appendChild(thead);
    renderMatch(tbody,tabId,mk,td[mk]);
    tbl.appendChild(tbody);
    return tbl;
  }

  panel.appendChild(makeMatchTable('m1', tabId.replace(/-/g,' ').toUpperCase()+' \u2014 MATCH 1'));
  panel.appendChild(makeMatchTable('m2', tabId.replace(/-/g,' ').toUpperCase()+' \u2014 MATCH 2'));
}

function renderMatch(tbody,tabId,mk,md){
  addTeamHdr(tbody,tabId,mk,'t1name',md.t1name,'Top Team');
  md.t1pts.forEach((pt,i)=>tbody.appendChild(makeRow(tabId,mk,'t1pts',i,pt)));
  addTeamHdr(tbody,tabId,mk,'t2name',md.t2name,'Bottom Team');
  md.t2pts.forEach((pt,i)=>tbody.appendChild(makeRow(tabId,mk,'t2pts',i,pt)));
}

function addTeamHdr(tbody,tabId,mk,nk,val,ph){
  const tr=document.createElement('tr');tr.className='teamhdr';
  const td=document.createElement('td');td.colSpan=6+BKS.length;
  const sel=document.createElement('select');
  sel.style.cssText='border:none;background:transparent;font-family:Arial,sans-serif;font-size:11px;font-weight:bold;color:#000;outline:none;cursor:pointer;max-width:300px';
  const blank=document.createElement('option');blank.value='';blank.textContent='-- '+ph+' --';sel.appendChild(blank);
  TEAMS.forEach(t=>{
    const opt=document.createElement('option');opt.value=t;opt.textContent=t;
    if(t===(val||'')) opt.selected=true;
    sel.appendChild(opt);
  });
  sel.onchange=e=>{data[tabId][mk][nk]=e.target.value;saveTab(tabId);};
  td.appendChild(sel);tr.appendChild(td);tbody.appendChild(tr);
}

function makeRow(tabId,mk,tk,idx,pt){
  const row=document.createElement('tr');
  const tdPt=document.createElement('td');tdPt.className='cpt';tdPt.textContent=idx+1;row.appendChild(tdPt);
  const tdWL=document.createElement('td');tdWL.className='cwl';tdWL.style.padding='0';
  const wlSel=document.createElement('select');
  wlSel.style.cssText='width:100%;height:20px;border:none;background:transparent;font-family:Arial,sans-serif;font-size:11px;font-weight:bold;text-align:center;cursor:pointer;outline:none';
  ['','W','L','NP'].forEach(v=>{
    const opt=document.createElement('option');opt.value=v;opt.textContent=v||'-';
    if(v===(pt.wl||'')) opt.selected=true;
    wlSel.appendChild(opt);
  });
  function applyWLStyle(){
    const v=wlSel.value;
    wlSel.style.background=v==='W'?'#d4edda':v==='L'?'#f8d7da':v==='NP'?'#fff3cd':'transparent';
    wlSel.style.color=v==='W'?'#155724':v==='L'?'#721c24':v==='NP'?'#856404':'#000';
  }
  applyWLStyle();
  wlSel.onchange=()=>{
    const v=wlSel.value;
    data[tabId][mk][tk][idx].wl=v;
    applyWLStyle();
    const oppTk=tk==='t1pts'?'t2pts':'t1pts';
    const oppWL=v==='W'?'L':v==='L'?'W':v;
    data[tabId][mk][oppTk][idx].wl=oppWL;
    saveTab(tabId);
    updateScoreCell(tabId,mk,tk);
    updateScoreCell(tabId,mk,oppTk);
    updateScoreBar();
    panelBuilt[tabId]=false;
    showTab(tabId);
  };
  tdWL.appendChild(wlSel);
  row.appendChild(tdWL);
  const tdRB=document.createElement('td');tdRB.className='crb '+(pt.rb||'');tdRB.textContent=pt.rb||'';
  tdRB.onclick=()=>{
    const c=data[tabId][mk][tk][idx].rb;
    const newRB=c==='Red'?'Blue':c==='Blue'?'':c===''?'Red':'Red';
    data[tabId][mk][tk][idx].rb=newRB;
    const oppTk=tk==='t1pts'?'t2pts':'t1pts';
    data[tabId][mk][oppTk][idx].rb=newRB==='Red'?'Blue':newRB==='Blue'?'Red':'';
    saveTab(tabId);
    panelBuilt[tabId]=false;
    showTab(tabId);
  };
  row.appendChild(tdRB);
  const tdSc=document.createElement('td');tdSc.className='csc';
  tdSc.dataset.scorefor=`${tabId}|${mk}|${tk}`;
  {
    let w=0,l=0,hasAny=false;
    for(let i=0;i<=idx;i++){
      const v=data[tabId][mk][tk][i]?.wl;
      if(v==='W'){w++;hasAny=true;}
      else if(v==='L'){l++;hasAny=true;}
      else if(v==='NP') hasAny=true;
    }
    const thisV=data[tabId][mk][tk][idx]?.wl;
    tdSc.textContent=(thisV&&thisV!=='')?w+'-'+l:'';
  }
  row.appendChild(tdSc);
  const tdTm=document.createElement('td');tdTm.className='ctm';
  const timInp=document.createElement('input');
  timInp.type='text';timInp.value=pt.time||'';timInp.placeholder='0:00';
  timInp.onchange=e=>{
    const t=e.target.value;
    data[tabId][mk][tk][idx].time=t;
    const oppTk=tk==='t1pts'?'t2pts':'t1pts';
    data[tabId][mk][oppTk][idx].time=t;
    saveTab(tabId);
  };
  tdTm.appendChild(timInp);row.appendChild(tdTm);
  const _BK_DARK=['SOB','Alpha','HS','H\u2206','Baby','100'];
  const _BK_MED=['SC','Beast'];
  const _BK_LITE=['Sniper','Dagger'];
  BKS.forEach(b=>{
    const moves=pt[b]||[];
    const td=document.createElement('td');
    const shade=_BK_DARK.includes(b)?'cbk cbk-dark':_BK_MED.includes(b)?'cbk cbk-med':_BK_LITE.includes(b)?'cbk cbk-lite':'cbk';
    td.className=shade;
    td.dataset.bkkey=`${tabId}|${mk}|${tk}|${idx}|${b}`;
    renderBkCell(td,moves);
    td.onclick=()=>openMovePopup(tabId,mk,tk,idx,b,data[tabId][mk][tk][idx][b]);
    row.appendChild(td);
  });
  const tdNo=document.createElement('td');tdNo.className='cno';
  const noteInp=document.createElement('input');
  noteInp.type='text';noteInp.value=pt.notes||'';noteInp.placeholder='notes...';
  noteInp.onchange=e=>{data[tabId][mk][tk][idx].notes=e.target.value;saveTab(tabId);};
  tdNo.appendChild(noteInp);row.appendChild(tdNo);
  const tdKey=document.createElement('td');tdKey.style.minWidth='20px';row.appendChild(tdKey);
  return row;
}

function updateScoreCell(tabId,mk,tk){
  const panel=document.getElementById('panel-'+tabId);
  if(!panel) return;
  const cells=[...panel.querySelectorAll(`td[data-scorefor="${tabId}|${mk}|${tk}"]`)];
  cells.forEach((cell,idx)=>{
    let w=0,l=0;
    for(let i=0;i<=idx;i++){
      const v=data[tabId][mk][tk][i]?.wl;
      if(v==='W')w++;else if(v==='L')l++;
    }
    const thisV=data[tabId][mk][tk][idx]?.wl;
    cell.textContent=(thisV&&thisV!=='')?w+'-'+l:'';
  });
}

function renderBkCell(td,moves){
  td.innerHTML='';
  td.className=td.className.replace(/\s*mv-\w+/g,'');
  td.style.background='';
  td.style.padding='0 2px';
  td.style.display='';
  if(!moves||moves.length===0) return;
  const realMoves=moves.filter(mv=>mv.isDead||(mv.sym&&mv.sym!=='_'));
  if(realMoves.length===0) return;
  const orderColor={primary:'#c8e6c9',secondary:'#ffe0b2',tertiary:'#bbdefb'};
  if(realMoves.length===1&&realMoves[0].isDead){
    td.style.background='#ef9a9a';td.style.textAlign='center';td.style.verticalAlign='middle';td.style.padding='0 2px';
    const mv=realMoves[0];
    if(mv.sym){
      const span=document.createElement('span');
      let txt=mv.sym;
      if(mv.pen&&mv.pen!=='none') txt+='\u00b0'+mv.pen;
      span.style.cssText='color:#000;font-weight:bold';
      span.textContent=txt;
      td.appendChild(span);
      if(mv.seqNum){const sup=document.createElement('sup');sup.textContent=mv.seqNum;sup.style.color='#000';td.appendChild(sup);}
    }
    return;
  }
  if(realMoves.length===1){
    td.style.background=orderColor[realMoves[0].order]||'#eee';
    td.style.textAlign='center';
    td.style.verticalAlign='middle';
    td.style.padding='0 2px';
    const span=document.createElement('span');
    let txt=realMoves[0].sym;
    if(realMoves[0].pen&&realMoves[0].pen!=='none') txt+='\u00b0'+realMoves[0].pen;
    span.style.cssText='color:#000;font-weight:bold';
    span.textContent=txt;
    td.appendChild(span);
    if(realMoves[0].seqNum){
      const sup=document.createElement('sup');sup.textContent=realMoves[0].seqNum;sup.style.color='#000';td.appendChild(sup);
    }
  } else {
    td.style.display='flex';
    td.style.height='100%';
    td.style.minHeight='22px';
    realMoves.forEach(mv=>{
      const half=document.createElement('div');
      const bg=mv.isDead?'#ef9a9a':(orderColor[mv.order]||'#eee');
      half.style.cssText='flex:1;display:flex;align-items:center;justify-content:center;background:'+bg+';padding:0 2px';
      let txt=mv.sym||'';
      if(mv.pen&&mv.pen!=='none') txt+='\u00b0'+mv.pen;
      half.style.color='#000';
      half.style.fontWeight='bold';
      half.style.fontSize='11px';
      half.textContent=txt;
      if(mv.seqNum){
        const sup=document.createElement('sup');sup.textContent=mv.seqNum;sup.style.color='#000';half.appendChild(sup);
      }
      td.appendChild(half);
    });
  }
}

// ── MOVE POPUP ───────────────────────────────
let popCell=null;
let _editingMoveIdx=null;

function openMovePopup(tabId,mk,tk,idx,bk,existingMoves){
  popCell={tabId,mk,tk,idx,bk};
  _editingMoveIdx=null;
  window._selSym='';
  window._selMod='';
  window._selDeath=false;
  window._selOrder='primary';
  window._selPen='none';
  window._selPlayer=null;
  document.getElementById('pop-pt').textContent=idx+1;
  document.getElementById('pop-bk').textContent=bk;
  buildMoveContent();
  document.getElementById('moveo').classList.add('open');
}

function buildMoveContent(){
  const cont=document.getElementById('move-content');
  cont.innerHTML='';
  if(popCell){
    const{tabId,mk,tk,idx,bk}=popCell;
    const existing=(data[tabId][mk][tk][idx][bk]||[]);
    if(existing.length>0){
      const sumDiv=document.createElement('div');sumDiv.className='move-summary';
      existing.forEach((mv,i)=>{
        const row=document.createElement('div');row.className='ms-row';
        // Highlight if this move is being edited
        const isEditing=(_editingMoveIdx===i);
        row.style.cssText='display:flex;align-items:center;gap:6px;margin-bottom:2px;padding:3px 4px;border-radius:3px;cursor:pointer;'+(isEditing?'background:#e3f2fd;border:1px solid #1565c0;':'background:transparent;border:1px solid transparent;');
        const dot=document.createElement('span');
        dot.className='dot '+(mv.order==='primary'?'dot-g':mv.order==='secondary'?'dot-y':'dot-r');
        dot.textContent=i+1;
        const symSpan=document.createElement('span');symSpan.className='ms-sym';
        const dispSym=mv.isDead?'Death':(mv.sym||'');
        symSpan.textContent=dispSym+(mv.seqNum?mv.seqNum:'')+(mv.pen&&mv.pen!=='none'?' ('+mv.pen+')':'');
        if(mv.order==='primary')symSpan.style.color='#1b5e20';
        else if(mv.order==='secondary')symSpan.style.color='#e65100';
        else symSpan.style.color='#1565c0';
        const ordSpan=document.createElement('span');ordSpan.className='ms-bk';
        ordSpan.textContent=mv.order;
        const del=document.createElement('span');del.textContent='\u2715';
        del.style.cssText='color:#999;cursor:pointer;margin-left:auto;font-size:14px;padding:0 4px';
        del.onclick=(e)=>{
          e.stopPropagation();
          // If deleting the move being edited, cancel edit mode
          if(_editingMoveIdx===i){
            _editingMoveIdx=null;
            window._selSym='';window._selMod='';window._selDeath=false;
            window._selOrder='primary';window._selPen='none';window._selPlayer=null;
            document.getElementById('btn-app').textContent='ADD';
            document.getElementById('btn-app').style.background='#1565c0';
          } else if(_editingMoveIdx!==null&&_editingMoveIdx>i){
            _editingMoveIdx--;
          }
          data[tabId][mk][tk][idx][bk].splice(i,1);
          saveTab(tabId);
          const panel=document.getElementById('panel-'+tabId);
          if(panel){
            const key=`${tabId}|${mk}|${tk}|${idx}|${bk}`;
            const cell=panel.querySelector(`td[data-bkkey="${CSS.escape(key)}"]`);
            if(cell) renderBkCell(cell,data[tabId][mk][tk][idx][bk]);
          }
          buildMoveContent();
        };
        // Tap row to edit
        row.onclick=()=>{
          if(_editingMoveIdx===i){
            // Deselect — cancel edit
            _editingMoveIdx=null;
            window._selSym='';window._selMod='';window._selDeath=false;
            window._selOrder='primary';window._selPen='none';window._selPlayer=null;
            document.getElementById('btn-app').textContent='ADD';
            document.getElementById('btn-app').style.background='#1565c0';
          } else {
            // Load this move into the picker
            _editingMoveIdx=i;
            const m=data[tabId][mk][tk][idx][bk][i];
            window._selDeath=m.isDead||false;
            // Parse sym and mod — sym is base char, mod is ^ or v suffix
            const rawSym=m.sym||'';
            if(rawSym.endsWith('^')){window._selSym=rawSym.slice(0,-1);window._selMod='^';}
            else if(rawSym.endsWith('v')){window._selSym=rawSym.slice(0,-1);window._selMod='v';}
            else{window._selSym=rawSym;window._selMod='';}
            window._selOrder=m.order||'primary';
            window._selPen=m.pen||'none';
            window._selPlayer=m.player||null;
            document.getElementById('btn-app').textContent='UPDATE';
            document.getElementById('btn-app').style.background='#e65100';
          }
          buildMoveContent();
        };
        row.appendChild(dot);row.appendChild(symSpan);row.appendChild(ordSpan);row.appendChild(del);
        sumDiv.appendChild(row);
      });
      cont.appendChild(sumDiv);
      const hr=document.createElement('hr');hr.style.cssText='border:none;border-top:1px solid #e0e0e0;margin:8px 0';
      cont.appendChild(hr);
    }
  }
  const isSOB=(popCell&&popCell.bk==='SOB');
  const symLbl=document.createElement('div');
  symLbl.style.cssText='font-size:10px;font-weight:bold;color:#555;margin:4px 0 3px;text-transform:uppercase;letter-spacing:1px';
  symLbl.textContent=isSOB?'Snake off Break:':'Shooting Direction:';
  cont.appendChild(symLbl);
  const symGrid=document.createElement('div');symGrid.className='symgrid';
  const activeSyms=isSOB?[{s:'S1',l:'S1'},{s:'S2',l:'S2'},{s:'S3',l:'S3'},{s:'Tequila',l:'Tequila'}]:SYMS;
  activeSyms.forEach(({s,l})=>{
    const btn=document.createElement('button');btn.className='sym';
    btn.innerHTML=s+'<span class="sl">'+l+'</span>';
    btn.onclick=()=>{
      symGrid.querySelectorAll('.sym').forEach(x=>x.classList.remove('sel'));
      btn.classList.add('sel');
      window._selSym=s;
    };
    symGrid.appendChild(btn);
  });
  cont.appendChild(symGrid);
  const optLbl=document.createElement('div');
  optLbl.style.cssText='font-size:10px;font-weight:bold;color:#555;margin:4px 0 3px';
  optLbl.textContent='Options:';
  cont.appendChild(optLbl);
  const optRow=document.createElement('div');
  optRow.style.cssText='display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-bottom:4px;width:100%';
  [
    {label:'Death',val:'death',bg:'#ffcdd2',border:'#c62828'},
    {label:'Deep',val:'v',bg:'#e3f2fd',border:'#1565c0'},
    {label:'Shallow',val:'^',bg:'#e3f2fd',border:'#1565c0'},
    {label:'Major',val:'Mj',bg:'#fff3e0',border:'#e65100'},
    {label:'Minor',val:'Mi',bg:'#fff8e1',border:'#f9a825'}
  ].forEach(({label,val,bg,border})=>{
    const btn=document.createElement('button');
    btn.style.cssText='height:28px;width:100%;border:2px solid #ccc;border-radius:3px;font-size:11px;font-weight:bold;cursor:pointer;background:#fff;font-family:Arial,sans-serif;padding:0';
    btn.textContent=label;
    const isSelected=(val==='death'&&window._selDeath)||(val==='v'&&window._selMod==='v')||(val==='^'&&window._selMod==='^')||((val==='Mi'||val==='Mj')&&window._selPen===val);
    if(isSelected){btn.style.borderColor=border;btn.style.background=bg;}
    btn.onclick=()=>{
      if(val==='death'){
        window._selDeath=!window._selDeath;
        btn.style.borderColor=window._selDeath?border:'#ccc';
        btn.style.background=window._selDeath?bg:'#fff';
      } else if(val==='v'||val==='^'){
        const already=window._selMod===val;
        optRow.querySelectorAll('button').forEach((b,bi)=>{if(bi===1||bi===2){b.style.borderColor='#ccc';b.style.background='#fff';}});
        window._selMod=already?'':val;
        if(!already){btn.style.borderColor=border;btn.style.background=bg;}
      } else {
        const already=window._selPen===val;
        optRow.querySelectorAll('button').forEach((b,bi)=>{if(bi===3||bi===4){b.style.borderColor='#ccc';b.style.background='#fff';}});
        window._selPen=already?'none':val;
        if(!already){btn.style.borderColor=border;btn.style.background=bg;}
      }
    };
    optRow.appendChild(btn);
  });
  cont.appendChild(optRow);
  const orderLbl=document.createElement('div');
  orderLbl.style.cssText='font-size:10px;font-weight:bold;color:#555;margin:4px 0 3px;text-transform:uppercase;letter-spacing:1px';
  orderLbl.textContent='Move Order:';
  cont.appendChild(orderLbl);
  const orderRow=document.createElement('div');
  orderRow.style.cssText='display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;margin-bottom:4px;width:100%';
  [
    {label:'\ud83d\udfe2 Primary',val:'primary',bg:'#e8f5e9',border:'#1b5e20'},
    {label:'\ud83d\udfe1 Secondary',val:'secondary',bg:'#fff8e1',border:'#e65100'},
    {label:'\ud83d\udd35 Tertiary',val:'tertiary',bg:'#e3f2fd',border:'#1565c0'}
  ].forEach(({label,val,bg,border})=>{
    const btn=document.createElement('button');
    btn.style.cssText='height:28px;width:100%;border:2px solid #ccc;border-radius:3px;font-size:11px;font-weight:bold;cursor:pointer;background:#fff;font-family:Arial,sans-serif;padding:0';
    btn.textContent=label;
    if(val===window._selOrder){btn.style.borderColor=border;btn.style.background=bg;}
    btn.onclick=()=>{
      orderRow.querySelectorAll('button').forEach(b=>{b.style.borderColor='#ccc';b.style.background='#fff';});
      btn.style.borderColor=border;btn.style.background=bg;
      window._selOrder=val;
    };
    orderRow.appendChild(btn);
  });
  cont.appendChild(orderRow);
  if(popCell){
    const{tabId,mk,tk}=popCell;
    const teamName=data[tabId][mk][tk==='t1pts'?'t1name':'t2name'];
    const teamKey=teamName?(teamName.replace(/\s+/g,'_').toLowerCase()):null;
    const players=(teamKey&&window._rosterData&&window._rosterData[teamKey])||[];
    const activePlayers=players.filter(p=>p.name||p.num);
    if(activePlayers.length>0){
      const rosterLbl=document.createElement('div');
      rosterLbl.style.cssText='font-size:10px;font-weight:bold;color:#555;margin:6px 0 3px';
      rosterLbl.textContent='Player:';
      cont.appendChild(rosterLbl);
      const rosterGrid=document.createElement('div');
      rosterGrid.style.cssText='display:grid;grid-template-columns:repeat(6,1fr);gap:3px;margin-bottom:6px';
      activePlayers.forEach(p=>{
        const lastName=p.name.split(' ').pop();
        const label=p.num?(p.num+' - '+lastName):lastName;
        const btn=document.createElement('button');
        btn.style.cssText='height:28px;width:100%;border:2px solid #ccc;border-radius:3px;font-size:10px;font-weight:bold;cursor:pointer;background:#fff;font-family:Arial,sans-serif;padding:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';
        btn.textContent=label;
        btn.title=p.name;
        btn.dataset.playerNum=p.num||'';
        btn.dataset.playerInitials=p.name.split(' ').map(w=>w[0]).join('').toUpperCase();
        if(window._selPlayer&&window._selPlayer.label===label){btn.style.borderColor='#1565c0';btn.style.background='#e3f2fd';}
        btn.onclick=()=>{
          rosterGrid.querySelectorAll('button').forEach(b=>{b.style.borderColor='#ccc';b.style.background='#fff';});
          if(window._selPlayer&&window._selPlayer.label===label){
            window._selPlayer=null;
          } else {
            btn.style.borderColor='#1565c0';btn.style.background='#e3f2fd';
            window._selPlayer={label,num:btn.dataset.playerNum,initials:btn.dataset.playerInitials};
          }
        };
        rosterGrid.appendChild(btn);
      });
      cont.appendChild(rosterGrid);
    }
  }
  const clearBtn=document.createElement('button');
  clearBtn.style.cssText='width:100%;padding:5px;margin-top:6px;border:1px solid #ccc;background:#fff;color:#999;font-size:11px;cursor:pointer;border-radius:3px;font-family:Arial,sans-serif';
  clearBtn.textContent='Clear This Cell';
  clearBtn.onclick=()=>{
    if(!popCell) return;
    const{tabId,mk,tk,idx,bk}=popCell;
    data[tabId][mk][tk][idx][bk]=[];
    saveTab(tabId);
    const panel=document.getElementById('panel-'+tabId);
    if(panel){
      const key=`${tabId}|${mk}|${tk}|${idx}|${bk}`;
      const cell=panel.querySelector(`td[data-bkkey="${CSS.escape(key)}"]`);
      if(cell) renderBkCell(cell,[]);
    }
    closeMove();
  };
  cont.appendChild(clearBtn);
}

window.closeMove=()=>{
  document.getElementById('moveo').classList.remove('open');
  document.getElementById('btn-app').textContent='ADD';
  document.getElementById('btn-app').style.background='#1565c0';
  _editingMoveIdx=null;
  popCell=null;
};

window.applyMove=()=>{
  if(!popCell) return;
  const{tabId,mk,tk,idx,bk}=popCell;
  if(!window._selSym&&!window._selDeath){alert('Please pick a symbol or select Death.');return;}
  if(!data[tabId][mk][tk][idx][bk]) data[tabId][mk][tk][idx][bk]=[];
  const finalSym=(window._selSym||'')+(window._selDeath?'':(window._selMod||''));
  let seqNum=null;
  if(window._selPlayer){
    seqNum=window._selPlayer.num||window._selPlayer.initials||null;
  }
  const newMove={
    sym:finalSym,
    isDead:window._selDeath||false,
    player:window._selPlayer||null,
    seqNum,
    order:window._selOrder||'primary',
    pen:window._selPen||'none',
  };

  if(_editingMoveIdx!==null){
    // UPDATE mode — overwrite the existing move at that index
    data[tabId][mk][tk][idx][bk][_editingMoveIdx]=newMove;
    _editingMoveIdx=null;
    document.getElementById('btn-app').textContent='ADD';
    document.getElementById('btn-app').style.background='#1565c0';
  } else {
    // ADD mode — push new move
    data[tabId][mk][tk][idx][bk].push(newMove);
  }

  saveTab(tabId);
  window._selSym='';
  window._selMod='';
  window._selDeath=false;
  window._selOrder='primary';
  window._selPen='none';
  window._selPlayer=null;
  const panel=document.getElementById('panel-'+tabId);
  if(panel){
    const key=`${tabId}|${mk}|${tk}|${idx}|${bk}`;
    const cell=panel.querySelector(`td[data-bkkey="${CSS.escape(key)}"]`);
    if(cell) renderBkCell(cell,data[tabId][mk][tk][idx][bk]);
  }
  buildMoveContent();
};

document.getElementById('btn-cls').onclick=()=>closeMove();
document.getElementById('btn-can').onclick=()=>closeMove();
document.getElementById('btn-app').onclick=()=>applyMove();
document.getElementById('moveo').addEventListener('click',function(e){if(e.target.id==='moveo') closeMove();});

function renderRosters(panel){
  panel.innerHTML='';

  wrap.style.cssText='padding:10px;overflow:auto;height:100%';
  const title=document.createElement('div');
  title.style.cssText='font-size:14px;font-weight:bold;color:#00695c;margin-bottom:10px';
  title.textContent='Team Rosters';
  wrap.appendChild(title);
  const rosterData=window._rosterData||{};
  TEAMS.forEach(team=>{
    const teamKey=team.replace(/\s+/g,'_').toLowerCase();
    const hdr=document.createElement('div');
    hdr.style.cssText='background:#e0f2f1;border:1px solid #b2dfdb;border-radius:4px;padding:8px 12px;margin-bottom:4px;cursor:pointer;font-weight:bold;font-size:12px;display:flex;justify-content:space-between;align-items:center;user-select:none';

    const arrow=document.createElement('span');
    arrow.textContent='\u25b6';arrow.style.fontSize='10px';
    hdr.appendChild(arrow);
    const body=document.createElement('div');
    body.style.cssText='display:none;border:1px solid #b2dfdb;border-top:none;border-radius:0 0 4px 4px;margin-bottom:6px;padding:6px';
    const tbl=document.createElement('table');
    tbl.style.cssText='width:100%;border-collapse:collapse;margin-bottom:6px';
    const hrow=document.createElement('tr');
    ['#','Name'].forEach(h=>{
      const th=document.createElement('th');
      th.style.cssText='background:#b2dfdb;padding:4px 8px;font-size:11px;text-align:left;border:1px solid #ccc';
      th.textContent=h;hrow.appendChild(th);
    });
    tbl.appendChild(hrow);
    const players=rosterData[teamKey]||[];
    const rowCount=Math.max(players.length+1,15);
    for(let i=0;i<rowCount;i++){
      const p=players[i]||{num:'',name:''};
      const tr=document.createElement('tr');
      const tdNum=document.createElement('td');
      tdNum.style.cssText='border:1px solid #ddd;padding:2px;width:50px';
      const numInp=document.createElement('input');
      numInp.type='text';numInp.value=p.num||'';numInp.placeholder='#';
      numInp.style.cssText='width:100%;border:none;outline:none;font-size:11px;padding:2px 4px;text-align:center';
      numInp.onchange=()=>saveRosterRow(teamKey,i,numInp.value,nameInp.value);
      tdNum.appendChild(numInp);tr.appendChild(tdNum);
      const tdName=document.createElement('td');
      tdName.style.cssText='border:1px solid #ddd;padding:2px';
      const nameInp=document.createElement('input');
      nameInp.type='text';nameInp.value=p.name||'';nameInp.placeholder='Player name...';
      nameInp.style.cssText='width:100%;border:none;outline:none;font-size:11px;padding:2px 4px';
      nameInp.onchange=()=>saveRosterRow(teamKey,i,numInp.value,nameInp.value);
      tdName.appendChild(nameInp);tr.appendChild(tdName);
      tbl.appendChild(tr);
    }
    body.appendChild(tbl);
    const addBtn=document.createElement('button');
    addBtn.textContent='+ Add Player';
    addBtn.style.cssText='padding:5px 10px;border:1px dashed #00695c;background:#fff;color:#00695c;font-size:11px;cursor:pointer;border-radius:3px;width:100%';
    addBtn.onclick=()=>{
      if(!window._rosterData) window._rosterData={};
      if(!window._rosterData[teamKey]) window._rosterData[teamKey]=[];
      window._rosterData[teamKey].push({num:'',name:''});
      renderRosters(panel);
      setTimeout(()=>{
        const hdrs=[...panel.querySelectorAll('[data-teamkey]')];
        const h=hdrs.find(x=>x.dataset.teamkey===teamKey);
        if(h) h.click();
      },50);
    };
    body.appendChild(addBtn);
    hdr.dataset.teamkey=teamKey;
    hdr.onclick=()=>{
      const isOpen=body.style.display!=='none';
      body.style.display=isOpen?'none':'block';
      arrow.textContent=isOpen?'\u25b6':'\u25bc';
    };
    wrap.appendChild(hdr);
    wrap.appendChild(body);
  });
  panel.appendChild(wrap);
}

function saveRosterRow(teamKey,idx,num,name){
  if(!window._rosterData) window._rosterData={};
  if(!window._rosterData[teamKey]) window._rosterData[teamKey]=[];
  window._rosterData[teamKey][idx]={num,name};
  if(db) db.ref('rosters/'+teamKey).set(window._rosterData[teamKey]);
}

function loadRosters(){
  if(!db) return;
  db.ref('rosters').on('value',snap=>{
    const existing=snap.val()||{};
    let needsWrite=false;
    Object.keys(PRELOADED_ROSTERS).forEach(key=>{
      if(!existing[key]||existing[key].length===0){
        existing[key]=PRELOADED_ROSTERS[key];
        needsWrite=true;
      }
    });
    if(needsWrite) db.ref('rosters').set(existing);
    window._rosterData=existing;

    // Fix: roster data just arrived — rebuild stats panel so player dropdown
    // populates correctly on page load (Jungle Cats / TEAMS[0] timing bug)
    panelBuilt['stats']=false;
    if(activeTab==='stats'){ renderIntoPanel('stats'); }

    // Only re-render rosters if the panel hasn't been built yet (don't collapse while editing)
    if(activeTab==='rosters'&&!panelBuilt['rosters']){ showTab('rosters'); }
  });
}

function renderStats(panel){
  const div=document.createElement('div');div.className='stats-wrap';
  const bkAll={};
  BKS.forEach(b=>bkAll[b]={runs:0,deaths:0,kills:0,oppRuns:0});
  // SOB sub-route tracking
  bkAll._sobSubs={S1:0,S2:0,S3:0,Tequila:0};
  const teamStats={};
  TEAMS.forEach(t=>{
    teamStats[t]={};
    BKS.forEach(b=>teamStats[t][b]={runs:0,deaths:0,kills:0,oppRuns:0});
    teamStats[t]._sobSubs={S1:0,S2:0,S3:0,Tequila:0};
  });
  const teamPts={};
  TEAMS.forEach(t=>{teamPts[t]=0;});
  let totalPtsAll=0;

  TABS.forEach(t=>{
    if(t.id==='stats'||!data[t.id]) return;
    ['m1','m2'].forEach(mk=>{
      const md=data[t.id][mk];
      const teams=[
        {tk:'t1pts',name:md.t1name,oppTk:'t2pts',oppName:md.t2name},
        {tk:'t2pts',name:md.t2name,oppTk:'t1pts',oppName:md.t1name}
      ];
      teams.forEach(({tk,name,oppTk})=>{
        (md[tk]||[]).forEach((pt,ptIdx)=>{
          const oppPt=(md[oppTk]||[])[ptIdx]||{};
          const hasData=pt.wl||BKS.some(b=>(pt[b]||[]).length>0);
          if(hasData){
            totalPtsAll++;
            if(name&&teamPts[name]!==undefined) teamPts[name]++;
          }
          BKS.forEach(b=>{
            (pt[b]||[]).forEach(mv=>{
              if(mv.isDead||(mv.sym&&mv.sym!=='_')){
                bkAll[b].runs++;
                if(name&&teamStats[name]) teamStats[name][b].runs++;
                // Track SOB sub-routes
                if(b==='SOB'&&mv.sym){
                  const sub=SOB_SUBS.find(s=>mv.sym===s||mv.sym.startsWith(s));
                  if(sub){
                    bkAll._sobSubs[sub]=(bkAll._sobSubs[sub]||0)+1;
                    if(name&&teamStats[name]) teamStats[name]._sobSubs[sub]=(teamStats[name]._sobSubs[sub]||0)+1;
                  }
                }
              }
              if(mv.isDead){
                bkAll[b].deaths++;
                if(name&&teamStats[name]) teamStats[name][b].deaths++;
              }
            });
            const oppDeaths=(oppPt[b]||[]).filter(mv=>mv.isDead).length;
            if(oppDeaths>0){
              bkAll[b].kills+=oppDeaths;
              if(name&&teamStats[name]) teamStats[name][b].kills+=oppDeaths;
            }
            const oppRunCount=(oppPt[b]||[]).filter(mv=>mv.isDead||(mv.sym&&mv.sym!=='_')).length;
            if(oppRunCount>0){
              bkAll[b].oppRuns+=oppRunCount;
              if(name&&teamStats[name]) teamStats[name][b].oppRuns+=oppRunCount;
            }
          });
        });
      });
    });
  });

  const statsLayout=document.createElement('div');
  statsLayout.style.cssText='display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap';
  const eventWrap=document.createElement('div');
  const eventH2=document.createElement('div');
  eventH2.style.cssText='font-size:14px;font-weight:bold;color:#6a1b9a;margin-bottom:8px';
  eventH2.textContent='Event Stats \u2014 All Matches';
  eventWrap.appendChild(eventH2);
  eventWrap.appendChild(makeStatsTbl(bkAll,true,totalPtsAll));
  statsLayout.appendChild(eventWrap);

  const teamMatches={};
  TEAMS.forEach(t=>{teamMatches[t]=[];});
  TABS.forEach(t=>{
    if(t.id==='stats'||t.id==='rosters'||!data[t.id]) return;
    ['m1','m2'].forEach(mk=>{
      const md=data[t.id][mk];
      [{tk:'t1pts',name:md.t1name},{tk:'t2pts',name:md.t2name}].forEach(({tk,name})=>{
        if(!name) return;
        const pts=md[tk]||[];
        const hasData=pts.some(pt=>pt.wl||BKS.some(b=>(pt[b]||[]).length>0));
        if(hasData&&teamMatches[name]) teamMatches[name].push({tabId:t.id,mk,tk});
      });
    });
  });

  const teamWrap=document.createElement('div');
  const teamHdrRow=document.createElement('div');
  teamHdrRow.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap';
  const teamH2=document.createElement('span');
  teamH2.style.cssText='font-size:14px;font-weight:bold;color:#6a1b9a';
  teamH2.textContent='Team Stats:';
  const teamSel=document.createElement('select');
  teamSel.style.cssText='border:1px solid #ccc;border-radius:3px;padding:3px 6px;font-size:12px;font-family:Arial,sans-serif;cursor:pointer';
  TEAMS.forEach(t=>{
    const opt=document.createElement('option');opt.value=t;opt.textContent=t;
    teamSel.appendChild(opt);
  });
  const matchSel=document.createElement('select');
  matchSel.style.cssText='border:1px solid #ccc;border-radius:3px;padding:3px 6px;font-size:12px;font-family:Arial,sans-serif;cursor:pointer';
  teamHdrRow.appendChild(teamH2);
  teamHdrRow.appendChild(teamSel);
  teamHdrRow.appendChild(matchSel);
  teamWrap.appendChild(teamHdrRow);
  const teamTblWrap=document.createElement('div');
  teamWrap.appendChild(teamTblWrap);
  statsLayout.appendChild(teamWrap);
  div.appendChild(statsLayout);
  panel.appendChild(div);

  function calcTeamStats(team,matchIdx){
    const bk={};
    BKS.forEach(b=>bk[b]={runs:0,deaths:0,kills:0,oppRuns:0});
    bk._sobSubs={S1:0,S2:0,S3:0,Tequila:0};
    let pts=0;
    const matches=matchIdx===-1?teamMatches[team]:[teamMatches[team][matchIdx]].filter(Boolean);
    matches.forEach(({tabId,mk,tk})=>{
      const md=data[tabId][mk];
      const oppTk=tk==='t1pts'?'t2pts':'t1pts';
      (md[tk]||[]).forEach((pt,ptIdx)=>{
        const oppPt=(md[oppTk]||[])[ptIdx]||{};
        const hasData=pt.wl||BKS.some(b=>(pt[b]||[]).length>0);
        if(hasData) pts++;
        BKS.forEach(b=>{
          (pt[b]||[]).forEach(mv=>{
            if(mv.isDead||(mv.sym&&mv.sym!=='_')){
              bk[b].runs++;
              if(b==='SOB'&&mv.sym){
                const sub=SOB_SUBS.find(s=>mv.sym===s||mv.sym.startsWith(s));
                if(sub) bk._sobSubs[sub]=(bk._sobSubs[sub]||0)+1;
              }
            }
            if(mv.isDead){bk[b].deaths++;}
          });
          const oppDeaths=(oppPt[b]||[]).filter(mv=>mv.isDead).length;
          bk[b].kills+=oppDeaths;
          const oppRuns=(oppPt[b]||[]).filter(mv=>mv.isDead||(mv.sym&&mv.sym!=='_')).length;
          bk[b].oppRuns+=oppRuns;
        });
      });
    });
    return {bk,pts};
  }

  function populateMatchSel(team){
    matchSel.innerHTML='';
    const allOpt=document.createElement('option');allOpt.value='-1';allOpt.textContent='All Matches';
    matchSel.appendChild(allOpt);
    (teamMatches[team]||[]).forEach((_,i)=>{
      const opt=document.createElement('option');opt.value=i;opt.textContent='Match '+(i+1);
      matchSel.appendChild(opt);
    });
  }

  function renderTeamStatsWithMatch(team,matchIdx){
    const {bk,pts}=calcTeamStats(team,matchIdx);
    teamTblWrap.innerHTML='';
    teamTblWrap.appendChild(makeStatsTbl(bk,false,pts));
  }

  function renderTeamStats(team){
    populateMatchSel(team);
    renderTeamStatsWithMatch(team,-1);
  }

  teamSel.onchange=()=>renderTeamStats(teamSel.value);
  matchSel.onchange=()=>renderTeamStatsWithMatch(teamSel.value,parseInt(matchSel.value));
  renderTeamStats(TEAMS[0]);

  // ── PLAYER STATS SECTION ──
  const playerSection=document.createElement('div');
  playerSection.style.cssText='margin-top:24px;border-top:2px solid #e0e0e0;padding-top:16px';
  const playerH2=document.createElement('div');
  playerH2.style.cssText='font-size:14px;font-weight:bold;color:#6a1b9a;margin-bottom:10px';
  playerH2.textContent='Player Stats';
  playerSection.appendChild(playerH2);
  const playerHdrRow=document.createElement('div');
  playerHdrRow.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap';
  const pTeamSel=document.createElement('select');
  pTeamSel.style.cssText='border:1px solid #ccc;border-radius:3px;padding:3px 6px;font-size:12px;font-family:Arial,sans-serif;cursor:pointer';
  TEAMS.forEach(t=>{const opt=document.createElement('option');opt.value=t;opt.textContent=t;pTeamSel.appendChild(opt);});
  const pPlayerSel=document.createElement('select');
  pPlayerSel.style.cssText='border:1px solid #ccc;border-radius:3px;padding:3px 6px;font-size:12px;font-family:Arial,sans-serif;cursor:pointer';
  playerHdrRow.appendChild(document.createTextNode('Team: '));
  playerHdrRow.appendChild(pTeamSel);
  playerHdrRow.appendChild(document.createTextNode('Player: '));
  playerHdrRow.appendChild(pPlayerSel);
  playerSection.appendChild(playerHdrRow);
  const playerTblWrap=document.createElement('div');
  playerSection.appendChild(playerTblWrap);
  div.appendChild(playerSection);

  function calcPlayerStats(team,playerLabel){
    const stats={pointsPlayed:0,pointsDied:0,penalties:{Mi:0,Mj:0},bunkers:{},deaths:{},shootingDir:{},sobSubs:{S1:0,S2:0,S3:0,Tequila:0}};
    BKS.forEach(b=>{stats.bunkers[b]=0;stats.deaths[b]=0;stats.shootingDir[b]={S:0,'\u2206':0,M:0,X:0};});
    TABS.forEach(t=>{
      if(t.id==='stats'||t.id==='rosters'||!data[t.id]) return;
      ['m1','m2'].forEach(mk=>{
        const md=data[t.id][mk];
        ['t1pts','t2pts'].forEach((tk,ti)=>{
          const tname=ti===0?md.t1name:md.t2name;
          if(tname!==team) return;
          (md[tk]||[]).forEach(pt=>{
            let appeared=false,died=false;
            BKS.forEach(b=>{
              (pt[b]||[]).forEach(mv=>{
                const mvLabel=mv.player&&mv.player.label?mv.player.label:(mv.player||null);
                if(mvLabel!==playerLabel) return;
                appeared=true;
                stats.bunkers[b]++;
                if(mv.isDead){died=true;stats.deaths[b]++;}
                if(mv.pen==='Mi') stats.penalties.Mi++;
                if(mv.pen==='Mj') stats.penalties.Mj++;
                // Track SOB sub-routes for player
                if(b==='SOB'&&mv.sym){
                  const sub=SOB_SUBS.find(s=>mv.sym===s||mv.sym.startsWith(s));
                  if(sub) stats.sobSubs[sub]=(stats.sobSubs[sub]||0)+1;
                }
                const sym=mv.sym||'';
                if(sym.startsWith('S')) stats.shootingDir[b].S++;
                else if(sym.startsWith('\u2206')) stats.shootingDir[b]['\u2206']++;
                else if(sym.startsWith('M')) stats.shootingDir[b].M++;
                else if(sym.startsWith('X')) stats.shootingDir[b].X++;
              });
            });
            if(appeared){stats.pointsPlayed++;if(died)stats.pointsDied++;}
          });
        });
      });
    });
    return stats;
  }

  function populatePlayerSel(team){
    pPlayerSel.innerHTML='';
    const teamKey=team.replace(/\s+/g,'_').toLowerCase();
    const players=(window._rosterData&&window._rosterData[teamKey])||[];
    const active=players.filter(p=>p.name||p.num);
    if(active.length===0){
      const opt=document.createElement('option');opt.textContent='No players in roster';pPlayerSel.appendChild(opt);return;
    }
    active.forEach(p=>{
      const lastName=p.name?p.name.split(' ').pop():'';
      const label=p.num?(p.num+' - '+lastName):lastName;
      const displayName=p.num?(p.num+' - '+p.name):p.name;
      const opt=document.createElement('option');opt.value=label;opt.textContent=displayName;
      pPlayerSel.appendChild(opt);
    });
  }

  function renderPlayerStats(team,playerLabel){
    playerTblWrap.innerHTML='';
    const s=calcPlayerStats(team,playerLabel);
    const pp=s.pointsPlayed;
    const deathPct=pp>0?(s.pointsDied/pp*100).toFixed(0)+'%':'0%';
    const summaryDiv=document.createElement('div');
    summaryDiv.style.cssText='display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px';
    [
      {label:'Points Played',val:pp},
      {label:'Points Died Off Break',val:s.pointsDied+' ('+deathPct+')'},
      {label:'Minor Penalties',val:s.penalties.Mi},
      {label:'Major Penalties',val:s.penalties.Mj},
    ].forEach(({label,val})=>{
      const card=document.createElement('div');
      card.style.cssText='background:#f5f5f5;border:1px solid #e0e0e0;border-radius:4px;padding:5px 10px;min-width:120px';
      const lbl=document.createElement('div');lbl.style.cssText='font-size:9px;color:#666';lbl.textContent=label;
      const v=document.createElement('div');v.style.cssText='font-size:14px;font-weight:bold;color:#1a6e1a';v.textContent=val;
      card.appendChild(lbl);card.appendChild(v);summaryDiv.appendChild(card);
    });
    playerTblWrap.appendChild(summaryDiv);
    const tbl=document.createElement('table');tbl.className='stats-tbl';
    const hdr=document.createElement('tr');
    ['Bunker','Count','Count %','Death %','Snake %','Middle %','Dorito %','Dive %'].forEach(h=>{
      const th=document.createElement('th');th.textContent=h;hdr.appendChild(th);
    });
    tbl.appendChild(hdr);
    const totalCount=BKS.reduce((sum,b)=>sum+(s.bunkers[b]||0),0);
    BKS.forEach((b,i)=>{
      const count=s.bunkers[b]||0;
      const countPct=(totalCount>0&&count>0)?(count/totalCount*100).toFixed(1)+'%':'0%';
      const deaths=s.deaths[b]||0;
      const deathPctB=count>0?(deaths/count*100).toFixed(0)+'%':'0%';
      const d=s.shootingDir[b]||{S:0,'\u2206':0,M:0,X:0};
      const dirTotal=d.S+d['\u2206']+d.M+d.X;
      const sPct=dirTotal>0?(d.S/dirTotal*100).toFixed(0)+'%':'0%';
      const mPct=dirTotal>0?(d.M/dirTotal*100).toFixed(0)+'%':'0%';
      const dPct=dirTotal>0?(d['\u2206']/dirTotal*100).toFixed(0)+'%':'0%';
      const xPct=dirTotal>0?(d.X/dirTotal*100).toFixed(0)+'%':'0%';
      const tr=document.createElement('tr');
      [b,count,countPct,deathPctB,sPct,mPct,dPct,xPct].forEach(v=>{
        const td=document.createElement('td');td.textContent=v;tr.appendChild(td);
      });
      tbl.appendChild(tr);
      // SOB sub-rows
      if(b==='SOB'){
        const sobTotal=SOB_SUBS.reduce((sum,sub)=>sum+(s.sobSubs[sub]||0),0);
        SOB_SUBS.forEach(sub=>{
          const subCount=s.sobSubs[sub]||0;
          const subPct=sobTotal>0?(subCount/sobTotal*100).toFixed(0)+'%':'0%';
          const subTr=document.createElement('tr');
          subTr.style.background='#f0f8ff';
          const vals=['\u2514 '+sub,subCount,subPct,'—','—','—','—','—'];
          vals.forEach((v,vi)=>{
            const td=document.createElement('td');
            td.textContent=v;
            td.style.fontSize='10px';
            td.style.color='#555';
            if(vi===0) td.style.paddingLeft='14px';
            subTr.appendChild(td);
          });
          tbl.appendChild(subTr);
        });
      }
    });
    playerTblWrap.appendChild(tbl);
  }

  populatePlayerSel(TEAMS[0]);
  renderPlayerStats(TEAMS[0],pPlayerSel.value);
  pTeamSel.onchange=()=>{
    populatePlayerSel(pTeamSel.value);
    renderPlayerStats(pTeamSel.value,pPlayerSel.value);
  };
  pPlayerSel.onchange=()=>renderPlayerStats(pTeamSel.value,pPlayerSel.value);
}

function makeStatsTbl(bkData,killsOnly,totalPts){
  const tbl=document.createElement('table');tbl.className='stats-tbl';
  const hdr=document.createElement('tr');
  const headers=killsOnly
    ?['Bunker','Shape','Bunkers Off Break','Bunker %','Kills Off Break','Kill %']
    :['Bunker','Shape','Bunkers Off Break','Bunker %','Deaths Off Break','Death %','Kills Off Break','Kill %'];
  headers.forEach(h=>{const th=document.createElement('th');th.textContent=h;hdr.appendChild(th);});
  tbl.appendChild(hdr);
  let allRuns=0,totRuns=0,totDeaths=0,totKills=0,totOppRuns=0;
  BKS.forEach(b=>{
    const s=bkData[b]||{runs:0,deaths:0,kills:0,oppRuns:0};
    allRuns+=s.runs;totDeaths+=s.deaths;totKills+=s.kills;totOppRuns+=s.oppRuns;
  });
  totRuns=allRuns;
  BKS.forEach((b,i)=>{
    const s=bkData[b]||{runs:0,deaths:0,kills:0,oppRuns:0};
    const deathPct=s.runs>0?(s.deaths/s.runs*100).toFixed(0)+'%':'\u2014';
    const killPct=s.oppRuns>0?(s.kills/s.oppRuns*100).toFixed(0)+'%':'\u2014';
    const bunkPct=allRuns>0?(s.runs/allRuns*100).toFixed(1)+'%':'\u2014';
    const tr=document.createElement('tr');
    const vals=killsOnly
      ?[b,SHAPES[i]||'',s.runs,bunkPct,s.kills,killPct]
      :[b,SHAPES[i]||'',s.runs,bunkPct,s.deaths,deathPct,s.kills,killPct];
    vals.forEach(v=>{const td=document.createElement('td');td.textContent=v;tr.appendChild(td);});
    tbl.appendChild(tr);
    // SOB sub-rows
    if(b==='SOB'){
      const sobSubs=bkData._sobSubs||{S1:0,S2:0,S3:0,Tequila:0};
      const sobTotal=SOB_SUBS.reduce((sum,sub)=>sum+(sobSubs[sub]||0),0);
      SOB_SUBS.forEach(sub=>{
        const subCount=sobSubs[sub]||0;
        const subPct=sobTotal>0?(subCount/sobTotal*100).toFixed(0)+'%':'0%';
        const subTr=document.createElement('tr');
        subTr.style.background='#f0f8ff';
        const colCount=killsOnly?6:8;
        const subVals=killsOnly
          ?['\u2514 '+sub,'',subCount,subPct,'','']
          :['\u2514 '+sub,'',subCount,subPct,'','\u2014','','\u2014'];
        subVals.forEach((v,vi)=>{
          const td=document.createElement('td');
          td.textContent=v;
          td.style.fontSize='10px';
          td.style.color='#555';
          if(vi===0) td.style.paddingLeft='14px';
          subTr.appendChild(td);
        });
        tbl.appendChild(subTr);
      });
    }
  });
  const totDeathPct=totRuns>0?(totDeaths/totRuns*100).toFixed(0)+'%':'\u2014';
  const totKillPct=totOppRuns>0?(totKills/totOppRuns*100).toFixed(0)+'%':'\u2014';
  const totTr=document.createElement('tr');totTr.className='tot';
  const totVals=killsOnly
    ?['TOTAL','',totRuns,'100%',totKills,totKillPct]
    :['TOTAL','',totRuns,'100%',totDeaths,totDeathPct,totKills,totKillPct];
  totVals.forEach(v=>{const td=document.createElement('td');td.textContent=v;totTr.appendChild(td);});
  tbl.appendChild(totTr);
  return tbl;
}
