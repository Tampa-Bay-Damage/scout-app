<html lang="en">

<style>html{height:-webkit-fill-available}</style>
<title>NXL Scout 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:Arial,sans-serif;font-size:12px;background:#fff;color:#000;overflow:hidden;height:100vh;height:-webkit-fill-available;display:flex;flex-direction:column}
.gs-toolbar{background:#f1f3f4;border-bottom:1px solid #e0e0e0;padding:4px 10px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.gs-title{font-size:14px;font-weight:bold;color:#202124;flex:1}
.gs-sync{font-size:11px;color:#5f6368;display:flex;align-items:center;gap:4px}
.sdot{width:7px;height:7px;border-radius:50%;background:#1e8e3e;display:inline-block;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.sess-lbl{font-size:10px;color:#888;border:1px solid #ddd;padding:2px 6px;border-radius:3px;background:#fff}
.score-bar{background:#fff;border-bottom:1px solid #e0e0e0;padding:3px 10px;display:flex;gap:16px;align-items:center;flex-shrink:0;font-size:11px;flex-wrap:wrap;min-height:24px}
.sc-red{font-weight:bold;color:#c00}.sc-blue{font-weight:bold;color:#00c}.sc-lbl{color:#555}
.sheet-wrap{flex:1;overflow:hidden;background:#fff;position:relative;min-height:0}
.tab-panel{display:none;position:absolute;top:0;left:0;right:0;bottom:0;overflow:auto;-webkit-overflow-scrolling:touch}
.tab-panel.active{display:block}
.tab-bar{background:#f8f9fa;border-top:1px solid #e0e0e0;display:flex;align-items:flex-end;overflow-x:auto;overflow-y:visible;flex-shrink:0;min-height:34px;padding:0 4px;-webkit-overflow-scrolling:touch}
.tab-bar::-webkit-scrollbar{height:3px}.tab-bar::-webkit-scrollbar-thumb{background:#ccc}
.tab{padding:6px 12px;font-size:11px;font-weight:500;color:#3c4043;cursor:pointer;border:1px solid transparent;border-bottom:none;border-radius:4px 4px 0 0;white-space:nowrap;height:30px;display:flex;align-items:center;background:#f8f9fa;margin-right:2px;user-select:none}
.tab.active{background:#fff;border-color:#e0e0e0;border-bottom-color:#fff;font-weight:700;position:relative;top:1px}
.tab.fri{color:#c0392b}.tab.fri.active{color:#c0392b}
.tab.sat{color:#1565c0}.tab.sat.active{color:#1565c0}
.tab.sun{color:#2e7d32}.tab.sun.active{color:#2e7d32}
.tab.stats-tab{color:#6a1b9a}.tab.stats-tab.active{color:#6a1b9a}
table{border-collapse:collapse;width:max-content}
th,td{border:1px solid #d0d0d0;text-align:center;vertical-align:middle;white-space:nowrap;font-family:Arial,sans-serif;font-size:11px;height:20px;padding:0 3px}
.hr1 th{background:#BDC0BF;font-size:11px;font-weight:bold;position:sticky;top:0;z-index:10;height:20px}
.hr2 th{background:#D5D5D5;font-size:10px;position:sticky;top:20px;z-index:10;height:20px}
.hr3 th{background:#DBDBDB;font-size:11px;font-weight:bold;position:sticky;top:40px;z-index:10;height:20px}
.hr3 th.bk{background:#EAEAEA}
td.cpt{min-width:22px;background:#f5f5f5;color:#555;font-size:10px;font-weight:bold}
td.cwl{min-width:28px;cursor:pointer;font-weight:bold;font-size:12px}
td.cwl.W{background:#d4edda;color:#155724}td.cwl.L{background:#f8d7da;color:#721c24}
td.crb{min-width:36px;cursor:pointer;font-weight:bold;font-size:11px}
td.crb.Red{background:#ffe0e0;color:#c00}td.crb.Blue{background:#e0e0ff;color:#00c}
td.csc{min-width:28px;font-weight:bold;font-size:11px}
td.ctm{min-width:44px;padding:0}
td.ctm input{width:100%;height:20px;border:none;padding:0 3px;font-family:Arial,sans-serif;font-size:10px;background:transparent;outline:none;text-align:center}
td.cbk{min-width:52px;cursor:pointer;font-size:11px;font-weight:bold;padding:1px 2px;position:relative;height:22px}
td.cbk:active{opacity:.7}
td.cno{min-width:90px;padding:0}
td.cno input{width:100%;height:20px;border:none;padding:0 3px;font-family:Arial,sans-serif;font-size:10px;background:transparent;outline:none}
tr.teamhdr td{background:#BDC0BF;font-weight:bold;font-size:11px;text-align:left;padding:1px 6px;border-top:2px solid #999}
tr.teamhdr td input{border:none;background:transparent;font-family:Arial,sans-serif;font-size:11px;font-weight:bold;outline:none;width:200px;color:#000}
tr.msep td{background:#d5d5d5;font-weight:bold;font-size:10px;text-align:center;padding:2px 5px;border-top:3px solid #888;color:#333;letter-spacing:1px}
tr.keyrow td{background:#fffde7;font-size:9px;color:#777;text-align:left;padding:1px 4px;border-top:1px solid #e8e8e8}
.mv-primary{background:#c8e6c9;color:#000}
.mv-secondary{background:#ffe0b2;color:#000}
.mv-tertiary{background:#ffcdd2;color:#000}
.stats-wrap{padding:12px;overflow:auto;height:100%}
.stats-wrap h2{font-size:14px;font-weight:bold;color:#6a1b9a;margin-bottom:10px}
.stats-wrap h3{font-size:12px;font-weight:bold;color:#333;margin:14px 0 4px;background:#f0f0f0;padding:4px 6px;border-left:3px solid #6a1b9a}
.stats-tbl{border-collapse:collapse;margin-bottom:4px}
.stats-tbl th{background:#D5D5D5;font-weight:bold;font-size:11px;padding:3px 8px;border:1px solid #bbb;text-align:center;white-space:nowrap}
.stats-tbl td{padding:3px 8px;border:1px solid #ddd;font-size:11px;text-align:center;white-space:nowrap}
.stats-tbl tr:nth-child(even) td{background:#f9f9f9}
.stats-tbl .tot td{background:#e0e0e0;font-weight:bold}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.ov.open{display:flex}
.pbox{background:#fff;border-top:3px solid #1a6e1a;border-radius:8px 8px 0 0;padding:14px 14px 32px;width:100%;max-width:440px;animation:up .15s ease;max-height:88vh;overflow-y:auto}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.ptitle{font-weight:bold;font-size:13px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.pcls{background:#f0f0f0;border:1px solid #ccc;border-radius:50%;width:26px;height:26px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-lbl{font-size:10px;font-weight:bold;color:#555;text-transform:uppercase;letter-spacing:1px;margin:10px 0 5px;display:flex;align-items:center;gap:6px}
.step-lbl .dot{width:18px;height:18px;border-radius:50%;font-size:10px;font-weight:bold;display:flex;align-items:center;justify-content:center;color:#fff}
.dot-g{background:#1b5e20}.dot-y{background:#e65100}.dot-r{background:#b71c1c}
.symgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:6px}
.sym{padding:9px 4px;border:2px solid #ccc;background:#fff;font-size:14px;font-weight:bold;cursor:pointer;text-align:center;font-family:Arial,sans-serif;border-radius:3px}
.sym .sl{display:block;font-size:9px;font-weight:normal;color:#666;margin-top:1px}
.sym.sel{border-color:#1a6e1a;background:#e8f5e9}
.bkgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:6px}
.bkbtn{padding:7px 4px;border:2px solid #ccc;background:#fff;font-size:11px;font-weight:bold;cursor:pointer;text-align:center;font-family:Arial,sans-serif;border-radius:3px}
.bkbtn.sel-y{border-color:#e65100;background:#fff8e1}
.bkbtn.sel-r{border-color:#b71c1c;background:#fce4ec}
.pen-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.pen-btn{padding:8px;border:2px solid #ccc;background:#fff;font-size:12px;font-weight:bold;cursor:pointer;text-align:center;border-radius:3px;font-family:Arial,sans-serif}
.pen-btn.sel{border-color:#333;background:#f0f0f0}
.add-move-btn{width:100%;padding:9px;border:1px dashed #ccc;background:#fff;font-size:12px;font-weight:bold;cursor:pointer;border-radius:3px;color:#555;font-family:Arial,sans-serif;margin-bottom:8px}
.add-move-btn:active{background:#f5f5f5}
.move-summary{background:#f5f5f5;border:1px solid #e0e0e0;border-radius:4px;padding:6px 8px;margin-bottom:8px;font-size:11px}
.move-summary .ms-row{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.ms-sym{font-weight:bold;font-size:13px}
.ms-bk{color:#555}
.ms-pen{font-size:10px;color:#888}
.pbtns{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.bcan{padding:10px;border:1px solid #aaa;background:#fff;font-family:Arial,sans-serif;font-size:12px;cursor:pointer;border-radius:3px}
.bapp{padding:10px;border:none;background:#1a6e1a;color:#fff;font-family:Arial,sans-serif;font-size:12px;font-weight:bold;cursor:pointer;border-radius:3px}
.divider{border:none;border-top:1px solid #e0e0e0;margin:8px 0}
</style>
</head>
<body>
<div style="display:flex;flex-direction:column;height:100vh;overflow:hidden">
  <div class="gs-toolbar">
    <div class="gs-title">NXL Scout 2026</div>
    <div class="sess-lbl" id="sesslbl">Loading...</div>
    <div class="gs-sync"><span class="sdot"></span><span id="sst">Connecting...</span></div>
  </div>
  <div class="score-bar" id="scorebar"></div>
  <div class="sheet-wrap" id="sheetwrap"></div>
  <div class="tab-bar" id="tabbar"></div>
</div>

<!-- MOVE POPUP -->

<div class="ov" id="moveo">
  <div class="pbox" id="movebox">
    <div class="ptitle">
      <span>Pt <span id="pop-pt"></span> &mdash; <span id="pop-bk" style="color:#1a6e1a"></span></span>
      <button class="pcls" id="btn-cls">&#x2715;</button>
    </div>
    <div id="move-content"></div>
    <div class="pbtns">
      <button class="bapp" id="btn-app" style="background:#1565c0">ADD</button>
      <button class="bcan" id="btn-can">CLOSE</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>

const FB={
  apiKey:"AIzaSyD-qvduCnJV7sQ2Nvhjvpj6yKKTQtkn0HU",
  authDomain:"nxl-scouting-sheet.firebaseapp.com",
  databaseURL:"https://nxl-scouting-sheet-default-rtdb.firebaseio.com",
  projectId:"nxl-scouting-sheet",
  storageBucket:"nxl-scouting-sheet.firebasestorage.app",
  messagingSenderId:"554139863559",
  appId:"1:554139863559:web:d7de30408e90bf29ceb8a2"
};

const BKS=["S1","Tequila","Seattle","SC","Alpha","Xbox","Sniper","HS","H\u2206","Dagger","Florida","Dallas","Baby","Beast","100","200","300"];
const SHAPES=["SB","","S","C","GB","GW","C","","MT","MT","","MT","GW","GB","Br","T","SD"];
const SYMS=[
  {s:"_",l:"Not Used"},{s:"O",l:"Dead"},{s:"S",l:"Snake"},
  {s:"\u2206",l:"Dorito"},{s:"X",l:"Dived"},{s:"S\u2206",l:"Sn+Dor"}
];
const MODIFIERS=[{s:"^",l:"Shallow"},{s:"v",l:"Deep"}];
const TEAMS=["Atlanta Jungle Cats","Chicago Aftershock","Chicago Wyldside Distortion","CK Hurricanes","Detroit Infamous","Edmonton Impact","Houston Heat","Los Angeles Collision","Los Angeles Ironmen","New Jersey Leverage","New York Xtreme","PaintballFIT","Perris ASG Aftermath","Red Legion","Royal City Seadogs","San Antonio X-Factor","San Diego Dynasty","Seattle Uprising","Tampa Bay Damage","TonTon Arsenal"];
const DAYS=["Fri","Sat","Sun"];
const PTS=15;
const TABS=[{id:"stats",label:"Stats",day:"stats"}];
DAYS.forEach(d=>{for(let s=1;s<=10;s++) TABS.push({id:`${d.toLowerCase()}-set${s}`,label:`${d} Set ${s}`,day:d.toLowerCase()});});

function getSession(){return new URLSearchParams(window.location.search).get('session')||'nxl-2026-event1';}
const SESSION=getSession();
document.getElementById('sesslbl').textContent=SESSION;

let db=null,activeTab='stats',data={};
const panelBuilt={};
const panelDirty={};

try{firebase.initializeApp(FB);db=firebase.database();}
catch(e){console.error('Firebase init error:',e);alert('Firebase: '+e.message);}

buildTabs();
createPanels();
listenFirebase();
showTab('stats');

// ── TABS ─────────────────────────────────────
function buildTabs(){
  const bar=document.getElementById('tabbar');bar.innerHTML='';
  TABS.forEach(t=>{
    const el=document.createElement('div');
    el.className=`tab ${t.day} ${t.id==='stats'?'stats-tab':''}`;
    el.textContent=t.label;el.id='tab-'+t.id;
    el.onclick=()=>showTab(t.id);bar.appendChild(el);
  });
}

// Pre-create all panel containers — content filled lazily
function createPanels(){
  const wrap=document.getElementById('sheetwrap');
  TABS.forEach(t=>{
    const panel=document.createElement('div');
    panel.className='tab-panel';
    panel.id='panel-'+t.id;
    wrap.appendChild(panel);
  });
}

function showTab(id){
  // Update tab bar highlight
  TABS.forEach(t=>{
    const e=document.getElementById('tab-'+t.id);
    if(e) e.classList.toggle('active',t.id===id);
  });
  // Hide old panel, show new one
  if(activeTab!==id){
    const oldPanel=document.getElementById('panel-'+activeTab);
    if(oldPanel) oldPanel.classList.remove('active');
  }
  activeTab=id;
  const panel=document.getElementById('panel-'+id);
  if(panel) panel.classList.add('active');

  // Always build if never built; re-render if data changed
  if(!panelBuilt[id]){
    initTab(id);
    renderIntoPanel(id);
    panelBuilt[id]=true;
    panelDirty[id]=false;
  } else if(panelDirty[id]){
    renderIntoPanel(id);
    panelDirty[id]=false;
  }
  updateScoreBar();
}

// ── FIREBASE ─────────────────────────────────
function listenFirebase(){
  db.ref(`sessions/${SESSION}`).on('value',snap=>{
    const d=snap.val()||{};
    TABS.forEach(t=>{
      if(t.id==='stats') return;
      if(d[t.id]){
        data[t.id]=normalizeTab(JSON.parse(JSON.stringify(d[t.id])));
      } else {
        initTab(t.id);
        saveTab(t.id); // write blank data to Firebase so it persists
      }
      panelDirty[t.id]=true;
    });
    // Always mark stats dirty so it rebuilds next visit
    panelBuilt['stats']=false;
    // Re-render active tab with latest data — but not if popup is open
    if(!popCell){
      panelBuilt[activeTab]=false;
      showTab(activeTab);
    } else if(activeTab==='stats'){
      // Always refresh stats even if popup open (stats has no popup)
      renderIntoPanel('stats');
    }
    updateScoreBar();
    document.getElementById('sst').textContent='Live \u2014 Synced';
  });
}

function initTab(id){
  if(data[id]) return;
  data[id]={
    m1:{t1name:'',t2name:'',t1pts:blankPts(),t2pts:blankPts()},
    m2:{t1name:'',t2name:'',t1pts:blankPts(),t2pts:blankPts()}
  };
}

// Normalize a point object to ensure all bunkers are arrays
function normalizePt(pt){
  const out={wl:pt.wl||'',rb:pt.rb||'',time:pt.time||'',notes:pt.notes||''};
  BKS.forEach(b=>{
    const val=pt[b];
    if(!val||val==='') out[b]=[];
    else if(typeof val==='string') out[b]=[{sym:val,order:'primary',pen:'none'}]; // legacy string format
    else if(Array.isArray(val)) out[b]=val;
    else if(typeof val==='object'){
      // Firebase converts arrays to objects with numeric keys {0:{...},1:{...}}
      out[b]=Object.values(val);
    }
    else out[b]=[];
  });
  return out;
}

function normalizeTab(tabData){
  if(!tabData) return null;
  ['m1','m2'].forEach(mk=>{
    if(!tabData[mk]) return;
    ['t1pts','t2pts'].forEach(tk=>{
      if(!tabData[mk][tk]) return;
      tabData[mk][tk]=tabData[mk][tk].map(pt=>normalizePt(pt));
    });
  });
  return tabData;
}

function blankPts(){
  return Array.from({length:PTS},()=>{
    const p={wl:'',rb:'',time:'',notes:''};
    BKS.forEach(b=>p[b]=[]);
    return p;
  });
}

function saveTab(id){if(db) db.ref(`sessions/${SESSION}/${id}`).set(data[id]);}

// ── SCORE BAR ─────────────────────────────────
function updateScoreBar(){
  const bar=document.getElementById('scorebar');
  if(activeTab==='stats'){bar.innerHTML='<span style="color:#888;font-size:11px">Event Stats</span>';return;}
  const td=data[activeTab];if(!td){bar.innerHTML='';return;}
  const sc=(mk,tk)=>{const pts=data[activeTab][mk][tk]||[];return pts.filter(p=>p.wl==='W').length+'-'+pts.filter(p=>p.wl==='L').length;};
  bar.innerHTML=`
    <span class="sc-lbl">M1:</span>
    <span class="sc-red">${td.m1.t1name||'Top Team'} ${sc('m1','t1pts')}</span>
    <span class="sc-lbl">vs</span>
    <span class="sc-blue">${td.m1.t2name||'Bot Team'} ${sc('m1','t2pts')}</span>
    &nbsp;
    <span class="sc-lbl">M2:</span>
    <span class="sc-red">${td.m2.t1name||'Top Team'} ${sc('m2','t1pts')}</span>
    <span class="sc-lbl">vs</span>
    <span class="sc-blue">${td.m2.t2name||'Bot Team'} ${sc('m2','t2pts')}</span>
  `;
}

// ── RENDER INTO PANEL ──────────────────────────
function renderIntoPanel(tabId){
  const panel=document.getElementById('panel-'+tabId);
  if(!panel) return;
  panel.innerHTML='';
  if(tabId==='stats'){renderStats(panel);return;}
  initTab(tabId);
  const td=data[tabId];

  function makeMatchTable(mk,matchLabel){
    const tbl=document.createElement('table');
    const thead=document.createElement('thead');
    const tbody=document.createElement('tbody');

    // Row 1 — merge first 5 cols for label, then blank bunker cols, then Notes/Key
    const r1=document.createElement('tr');r1.className='hr1';
    const thLabel=document.createElement('th');thLabel.textContent=matchLabel;thLabel.colSpan=5;r1.appendChild(thLabel);
    BKS.forEach(()=>{const th=document.createElement('th');r1.appendChild(th);});
    ['Notes','Key'].forEach(t=>{const th=document.createElement('th');th.textContent=t;r1.appendChild(th);});
    thead.appendChild(r1);

    // Row 2 - shapes
    const r2=document.createElement('tr');r2.className='hr2';
    ['','Shapes','','','',...SHAPES,'Notes','Key'].forEach(t=>{
      const th=document.createElement('th');th.textContent=t;r2.appendChild(th);
    });
    thead.appendChild(r2);

    // Row 3 - bunker names
    const r3=document.createElement('tr');r3.className='hr3';
    ['*','W/L','R/B','Score','Time',...BKS,'Notes','Key'].forEach((t,i)=>{
      const th=document.createElement('th');th.textContent=t;
      if(i>=5&&i<5+BKS.length) th.classList.add('bk');
      r3.appendChild(th);
    });
    thead.appendChild(r3);
    tbl.appendChild(thead);

    renderMatch(tbody,tabId,mk,td[mk]);

    const kr=document.createElement('tr');kr.className='keyrow';
    const kt=document.createElement('td');kt.colSpan=7+BKS.length;
    kt.textContent='Key:  O=Dead  S=Snake  \u2206=Dorito  X=Dived  S\u2206=Snake+Dorito  ^=Shallow  v=Deep  _=Not Used  | \ud83d\udfe2=Primary  \ud83d\udfe1=Secondary  \ud83d\udd34=Tertiary  | Mi=Minor Pen  Mj=Major Pen';
    kr.appendChild(kt);tbody.appendChild(kr);

    tbl.appendChild(tbody);
    return tbl;
  }

  panel.appendChild(makeMatchTable('m1', tabId.replace(/-/g,' ').toUpperCase()+' — MATCH 1'));
  panel.appendChild(makeMatchTable('m2', tabId.replace(/-/g,' ').toUpperCase()+' — MATCH 2'));
}

function renderMatch(tbody,tabId,mk,md){
  addTeamHdr(tbody,tabId,mk,'t1name',md.t1name,'Top Team');
  md.t1pts.forEach((pt,i)=>tbody.appendChild(makeRow(tabId,mk,'t1pts',i,pt)));
  addTeamHdr(tbody,tabId,mk,'t2name',md.t2name,'Bottom Team');
  md.t2pts.forEach((pt,i)=>tbody.appendChild(makeRow(tabId,mk,'t2pts',i,pt)));
}

function addTeamHdr(tbody,tabId,mk,nk,val,ph){
  const tr=document.createElement('tr');tr.className='teamhdr';
  const td=document.createElement('td');td.colSpan=7+BKS.length;
  const sel=document.createElement('select');
  sel.style.cssText='border:none;background:transparent;font-family:Arial,sans-serif;font-size:11px;font-weight:bold;color:#000;outline:none;cursor:pointer;max-width:300px';
  const blank=document.createElement('option');blank.value='';blank.textContent='-- '+ph+' --';sel.appendChild(blank);
  TEAMS.forEach(t=>{
    const opt=document.createElement('option');opt.value=t;opt.textContent=t;
    if(t===(val||'')) opt.selected=true;
    sel.appendChild(opt);
  });
  sel.onchange=e=>{data[tabId][mk][nk]=e.target.value;saveTab(tabId);};
  td.appendChild(sel);tr.appendChild(td);tbody.appendChild(tr);
}

function makeRow(tabId,mk,tk,idx,pt){
  const row=document.createElement('tr');

  const tdPt=document.createElement('td');tdPt.className='cpt';tdPt.textContent=idx+1;row.appendChild(tdPt);

  const tdWL=document.createElement('td');tdWL.className='cwl';tdWL.style.padding='0';
  const wlSel=document.createElement('select');
  wlSel.style.cssText='width:100%;height:20px;border:none;background:transparent;font-family:Arial,sans-serif;font-size:11px;font-weight:bold;text-align:center;cursor:pointer;outline:none';
  ['','W','L','NP'].forEach(v=>{
    const opt=document.createElement('option');opt.value=v;opt.textContent=v||'-';
    if(v===(pt.wl||'')) opt.selected=true;
    wlSel.appendChild(opt);
  });
  function applyWLStyle(){
    const v=wlSel.value;
    wlSel.style.background=v==='W'?'#d4edda':v==='L'?'#f8d7da':v==='NP'?'#fff3cd':'transparent';
    wlSel.style.color=v==='W'?'#155724':v==='L'?'#721c24':v==='NP'?'#856404':'#000';
  }
  applyWLStyle();
  wlSel.onchange=()=>{
    data[tabId][mk][tk][idx].wl=wlSel.value;
    applyWLStyle();
    saveTab(tabId);
    updateScoreCell(tabId,mk,tk);
    updateScoreBar();
  };
  tdWL.appendChild(wlSel);
  row.appendChild(tdWL);

  const tdRB=document.createElement('td');tdRB.className='crb '+(pt.rb||'');tdRB.textContent=pt.rb||'';
  tdRB.onclick=()=>{
    const c=data[tabId][mk][tk][idx].rb;
    data[tabId][mk][tk][idx].rb=c==='Red'?'Blue':c==='Blue'?'':c===''?'Red':'Red';
    saveTab(tabId);
    tdRB.className='crb '+(data[tabId][mk][tk][idx].rb||'');
    tdRB.textContent=data[tabId][mk][tk][idx].rb||'';
  };
  row.appendChild(tdRB);

  // Score cell — give it an ID so we can update it without full re-render
  const tdSc=document.createElement('td');tdSc.className='csc';
  tdSc.dataset.scorefor=`${tabId}|${mk}|${tk}`;
  {
    let w=0,l=0,hasAny=false;
    for(let i=0;i<=idx;i++){
      const v=data[tabId][mk][tk][i]?.wl;
      if(v==='W'){w++;hasAny=true;}
      else if(v==='L'){l++;hasAny=true;}
      else if(v==='NP') hasAny=true;
    }
    // Only show score if this row or a previous row has W/L/NP
    const thisV=data[tabId][mk][tk][idx]?.wl;
    tdSc.textContent=(thisV&&thisV!=='')?w+'-'+l:'';
  }
  row.appendChild(tdSc);

  const tdTm=document.createElement('td');tdTm.className='ctm';
  const timInp=document.createElement('input');
  timInp.type='text';timInp.value=pt.time||'';timInp.placeholder='0:00';
  timInp.onchange=e=>{data[tabId][mk][tk][idx].time=e.target.value;saveTab(tabId);};
  tdTm.appendChild(timInp);row.appendChild(tdTm);

  BKS.forEach(b=>{
    const moves=pt[b]||[];
    const td=document.createElement('td');td.className='cbk';
    td.dataset.bkkey=`${tabId}|${mk}|${tk}|${idx}|${b}`;
    renderBkCell(td,moves);
    td.onclick=()=>openMovePopup(tabId,mk,tk,idx,b,data[tabId][mk][tk][idx][b]);
    row.appendChild(td);
  });

  const tdNo=document.createElement('td');tdNo.className='cno';
  const noteInp=document.createElement('input');
  noteInp.type='text';noteInp.value=pt.notes||'';noteInp.placeholder='notes...';
  noteInp.oninput=e=>{data[tabId][mk][tk][idx].notes=e.target.value;saveTab(tabId);};
  tdNo.appendChild(noteInp);row.appendChild(tdNo);

  const tdKey=document.createElement('td');tdKey.style.minWidth='20px';row.appendChild(tdKey);

  return row;
}

// Update just the score column for a team without full re-render
function updateScoreCell(tabId,mk,tk){
  const panel=document.getElementById('panel-'+tabId);
  if(!panel) return;
  const cells=[...panel.querySelectorAll(`td[data-scorefor="${tabId}|${mk}|${tk}"]`)];
  cells.forEach((cell,idx)=>{
    let w=0,l=0;
    for(let i=0;i<=idx;i++){
      const v=data[tabId][mk][tk][i]?.wl;
      if(v==='W')w++;else if(v==='L')l++;
    }
    const thisV=data[tabId][mk][tk][idx]?.wl;
    cell.textContent=(thisV&&thisV!=='')?w+'-'+l:'';
  });
}

function getSeqGroups(pt){
  // Returns a map of bunkername -> group number (1-based)
  // Group = set of bunkers linked by primary->secondary->tertiary relationships
  // We scan all bunkers: primary moves start new groups, secondary/tertiary inherit
  const groups={};
  let groupNum=0;
  BKS.forEach(b=>{
    const moves=pt[b]||[];
    const primary=moves.find(m=>m.order==='primary');
    if(primary){
      groupNum++;
      groups[b]=groupNum;
    }
  });
  // Secondary/tertiary: find which group they belong to by looking at which primary
  // tapped them. Since secondary stores its own bk, we need to find the primary
  // that caused it. We reconstruct this from applyMove logic:
  // each popMoves set shares a group. We store groupId on the move object.
  // For now use order of appearance as fallback.
  BKS.forEach(b=>{
    const moves=pt[b]||[];
    const nonPrimary=moves.find(m=>m.order!=='primary');
    if(nonPrimary&&!groups[b]){
      // assign to group of move's groupId if stored, else 1
      groups[b]=nonPrimary.groupId||1;
    }
  });
  return groups;
}

function renderBkCell(td,moves){
  td.innerHTML='';
  td.className=td.className.replace(/\s*mv-\w+/g,'');
  td.style.background='';
  td.style.padding='0';
  if(!moves||moves.length===0) return;
  const realMoves=moves.filter(mv=>mv.sym&&mv.sym!=='_');
  if(realMoves.length===0) return;

  const orderColor={primary:'#c8e6c9',secondary:'#ffe0b2',tertiary:'#ffcdd2'};

  if(realMoves.length===1){
    // Single move — full cell color
    td.style.background=orderColor[realMoves[0].order]||'#eee';
    const span=document.createElement('span');
    let txt=realMoves[0].sym;
    if(realMoves[0].pen&&realMoves[0].pen!=='none') txt+='°'+realMoves[0].pen;
    span.style.cssText='color:#000;font-weight:bold';
    span.textContent=txt;
    td.appendChild(span);
    if(realMoves[0].seqNum){
      const sup=document.createElement('sup');sup.textContent=realMoves[0].seqNum;sup.style.color='#000';td.appendChild(sup);
    }
  } else {
    // Multiple moves — split vertically
    td.style.display='flex';
    td.style.height='100%';
    td.style.minHeight='22px';
    realMoves.forEach(mv=>{
      const half=document.createElement('div');
      half.style.cssText='flex:1;display:flex;align-items:center;justify-content:center;background:'+(orderColor[mv.order]||'#eee')+';padding:0 2px';
      let txt=mv.sym;
      if(mv.pen&&mv.pen!=='none') txt+='°'+mv.pen;
      half.style.color='#000';
      half.style.fontWeight='bold';
      half.style.fontSize='11px';
      half.textContent=txt;
      if(mv.seqNum){
        const sup=document.createElement('sup');sup.textContent=mv.seqNum;sup.style.color='#000';half.appendChild(sup);
      }
      td.appendChild(half);
    });
  }
}

// ── MOVE POPUP ───────────────────────────────
let popCell=null;

function openMovePopup(tabId,mk,tk,idx,bk,existingMoves){
  popCell={tabId,mk,tk,idx,bk};
  // Reset picker
  window._selSym='';
  window._selMod='';
  window._selOrder='primary';
  window._selPen='none';
  window._selSeq=null;
  document.getElementById('pop-pt').textContent=idx+1;
  document.getElementById('pop-bk').textContent=bk;
  buildMoveContent();
  document.getElementById('moveo').classList.add('open');
}

function buildMoveContent(){
  const cont=document.getElementById('move-content');
  cont.innerHTML='';

  // Show existing moves for this cell at top
  if(popCell){
    const{tabId,mk,tk,idx,bk}=popCell;
    const existing=(data[tabId][mk][tk][idx][bk]||[]);
    if(existing.length>0){
      const sumDiv=document.createElement('div');sumDiv.className='move-summary';
      existing.forEach((mv,i)=>{
        const row=document.createElement('div');row.className='ms-row';
        // Color dot
        const dot=document.createElement('span');
        dot.className='dot '+(mv.order==='primary'?'dot-g':mv.order==='secondary'?'dot-y':'dot-r');
        dot.textContent=i+1;
        // Sym + seq
        const symSpan=document.createElement('span');symSpan.className='ms-sym';
        symSpan.textContent=mv.sym+(mv.seqNum?'¹²³'[mv.seqNum-1]||mv.seqNum:'')+(mv.pen&&mv.pen!=='none'?' ('+mv.pen+')':'');
        if(mv.order==='primary')symSpan.style.color='#1b5e20';
        else if(mv.order==='secondary')symSpan.style.color='#e65100';
        else symSpan.style.color='#b71c1c';
        // Order label
        const ordSpan=document.createElement('span');ordSpan.className='ms-bk';
        ordSpan.textContent=mv.order;
        // Delete
        const del=document.createElement('span');del.textContent='✕';
        del.style.cssText='color:#999;cursor:pointer;margin-left:auto;font-size:14px;padding:0 4px';
        del.onclick=()=>{
          data[tabId][mk][tk][idx][bk].splice(i,1);
          saveTab(tabId);
          // Refresh cell without closing popup
          const panel=document.getElementById('panel-'+tabId);
          if(panel){
            const key=`${tabId}|${mk}|${tk}|${idx}|${bk}`;
            const cell=panel.querySelector(`td[data-bkkey="${CSS.escape(key)}"]`);
            if(cell) renderBkCell(cell,data[tabId][mk][tk][idx][bk]);
          }
          buildMoveContent();
        };
        row.appendChild(dot);row.appendChild(symSpan);row.appendChild(ordSpan);row.appendChild(del);
        sumDiv.appendChild(row);
      });
      cont.appendChild(sumDiv);
      const hr=document.createElement('hr');hr.style.cssText='border:none;border-top:1px solid #e0e0e0;margin:8px 0';
      cont.appendChild(hr);
    }
  }

  // Symbol grid
  const symGrid=document.createElement('div');symGrid.className='symgrid';
  SYMS.forEach(({s,l})=>{
    const btn=document.createElement('button');btn.className='sym';
    btn.innerHTML=s+'<span class="sl">'+l+'</span>';
    btn.onclick=()=>{
      symGrid.querySelectorAll('.sym').forEach(x=>x.classList.remove('sel'));
      btn.classList.add('sel');
      window._selSym=s;
    };
    symGrid.appendChild(btn);
  });
  cont.appendChild(symGrid);

  // Depth modifier (optional) — appends to symbol
  const modLbl=document.createElement('div');
  modLbl.style.cssText='font-size:10px;font-weight:bold;color:#555;margin:8px 0 4px';
  modLbl.textContent='Depth modifier (optional):';
  cont.appendChild(modLbl);

  const modRow=document.createElement('div');
  modRow.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px';
  MODIFIERS.forEach(({s,l})=>{
    const btn=document.createElement('button');
    btn.style.cssText='padding:8px;border:2px solid #ccc;border-radius:3px;font-size:13px;font-weight:bold;cursor:pointer;background:#fff;font-family:Arial,sans-serif';
    btn.textContent=s+' '+l;
    if(window._selMod===s){btn.style.borderColor='#333';btn.style.background='#f0f0f0';}
    btn.onclick=()=>{
      modRow.querySelectorAll('button').forEach(b=>{b.style.borderColor='#ccc';b.style.background='#fff';});
      if(window._selMod===s){window._selMod='';}
      else{btn.style.borderColor='#333';btn.style.background='#f0f0f0';window._selMod=s;}
    };
    modRow.appendChild(btn);
  });
  cont.appendChild(modRow);

  // Order selector
  const orderLbl=document.createElement('div');
  orderLbl.style.cssText='font-size:10px;font-weight:bold;color:#555;margin:10px 0 5px;text-transform:uppercase;letter-spacing:1px';
  orderLbl.textContent='Move Order:';
  cont.appendChild(orderLbl);

  const orderRow=document.createElement('div');
  orderRow.style.cssText='display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px';
  [
    {label:'🟢 Primary',val:'primary',bg:'#e8f5e9',border:'#1b5e20'},
    {label:'🟡 Secondary',val:'secondary',bg:'#fff8e1',border:'#e65100'},
    {label:'🔴 Tertiary',val:'tertiary',bg:'#fce4ec',border:'#b71c1c'}
  ].forEach(({label,val,bg,border})=>{
    const btn=document.createElement('button');
    btn.style.cssText='padding:8px 4px;border:2px solid #ccc;border-radius:3px;font-size:11px;font-weight:bold;cursor:pointer;background:#fff;font-family:Arial,sans-serif';
    btn.textContent=label;
    if(val===window._selOrder){btn.style.borderColor=border;btn.style.background=bg;}
    btn.onclick=()=>{
      orderRow.querySelectorAll('button').forEach(b=>{b.style.borderColor='#ccc';b.style.background='#fff';});
      btn.style.borderColor=border;btn.style.background=bg;
      window._selOrder=val;
    };
    orderRow.appendChild(btn);
  });
  cont.appendChild(orderRow);

  // Sequence # (optional)
  const seqRow=document.createElement('div');
  seqRow.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:8px';
  const seqLbl=document.createElement('div');
  seqLbl.style.cssText='font-size:10px;font-weight:bold;color:#555;white-space:nowrap';
  seqLbl.textContent='Sequence # (optional):';
  const seqInp=document.createElement('input');
  seqInp.type='text';
  seqInp.value=window._selSeq||'';
  seqInp.placeholder='—';
  seqInp.style.cssText='width:50px;padding:4px 6px;border:1px solid #ccc;border-radius:3px;font-size:12px;text-align:center';
  seqInp.oninput=()=>{window._selSeq=seqInp.value||null;};
  seqRow.appendChild(seqLbl);seqRow.appendChild(seqInp);
  cont.appendChild(seqRow);

  // Penalty (optional)
  const penLbl=document.createElement('div');
  penLbl.style.cssText='font-size:10px;font-weight:bold;color:#555;margin:6px 0 4px';
  penLbl.textContent='Penalty (optional):';
  cont.appendChild(penLbl);

  const penRow=document.createElement('div');penRow.className='pen-row';
  ['Minor (Mi)','Major (Mj)'].forEach((label,i)=>{
    const btn=document.createElement('button');btn.className='pen-btn';btn.textContent=label;
    const pv=i===0?'Mi':'Mj';
    btn.onclick=()=>{
      penRow.querySelectorAll('.pen-btn').forEach(x=>x.classList.remove('sel'));
      if(window._selPen===pv){window._selPen='none';}
      else{btn.classList.add('sel');window._selPen=pv;}
    };
    penRow.appendChild(btn);
  });
  cont.appendChild(penRow);

  // Clear button
  const clearBtn=document.createElement('button');
  clearBtn.style.cssText='width:100%;padding:8px;margin-top:10px;border:1px solid #ccc;background:#fff;color:#999;font-size:11px;cursor:pointer;border-radius:3px;font-family:Arial,sans-serif';
  clearBtn.textContent='Clear This Cell';
  clearBtn.onclick=()=>{
    if(!popCell) return;
    const{tabId,mk,tk,idx,bk}=popCell;
    data[tabId][mk][tk][idx][bk]=[];
    saveTab(tabId);
    const panel=document.getElementById('panel-'+tabId);
    if(panel){
      const key=`${tabId}|${mk}|${tk}|${idx}|${bk}`;
      const cell=panel.querySelector(`td[data-bkkey="${CSS.escape(key)}"]`);
      if(cell) renderBkCell(cell,[]);
    }
    closeMove();
  };
  cont.appendChild(clearBtn);
}

window.closeMove=()=>{
  document.getElementById('moveo').classList.remove('open');
  popCell=null;
};

window.applyMove=()=>{
  if(!popCell) return;
  const{tabId,mk,tk,idx,bk}=popCell;
  if(!window._selSym){alert('Please pick a symbol.');return;}

  if(!data[tabId][mk][tk][idx][bk]) data[tabId][mk][tk][idx][bk]=[];

  // Push new move to array (multiple moves supported)
  const finalSym=(window._selSym||'')+(window._selMod||'');
  data[tabId][mk][tk][idx][bk].push({
    sym:finalSym,
    order:window._selOrder||'primary',
    pen:window._selPen||'none',
    seqNum:window._selSeq||null
  });

  saveTab(tabId);

  // Reset picker, keep popup open
  window._selSym='';
  window._selMod='';
  window._selOrder='primary';
  window._selPen='none';
  window._selSeq=null;

  // Refresh cell in background without closing popup
  const panel=document.getElementById('panel-'+tabId);
  if(panel){
    const key=`${tabId}|${mk}|${tk}|${idx}|${bk}`;
    const cell=panel.querySelector(`td[data-bkkey="${CSS.escape(key)}"]`);
    if(cell) renderBkCell(cell,data[tabId][mk][tk][idx][bk]);
  }

  // Rebuild popup content to show updated move list
  buildMoveContent();
};


document.getElementById('btn-cls').onclick=()=>closeMove();
document.getElementById('btn-can').onclick=()=>closeMove();
document.getElementById('btn-app').onclick=()=>applyMove();
document.getElementById('moveo').addEventListener('click',function(e){if(e.target.id==='moveo') closeMove();});

// ── STATS ─────────────────────────────────────
function renderStats(panel){
  const div=document.createElement('div');div.className='stats-wrap';
  const bkAll={};
  BKS.forEach(b=>bkAll[b]={runs:0,deaths:0,kills:0,oppRuns:0});
  const teamStats={};
  TEAMS.forEach(t=>{teamStats[t]={};BKS.forEach(b=>teamStats[t][b]={runs:0,deaths:0,kills:0,oppRuns:0});});

  TABS.forEach(t=>{
    if(t.id==='stats'||!data[t.id]) return;
    ['m1','m2'].forEach(mk=>{
      const md=data[t.id][mk];
      // Process both teams together so we can cross-reference kills
      const teams=[
        {tk:'t1pts',name:md.t1name,oppTk:'t2pts',oppName:md.t2name},
        {tk:'t2pts',name:md.t2name,oppTk:'t1pts',oppName:md.t1name}
      ];
      teams.forEach(({tk,name,oppTk})=>{
        (md[tk]||[]).forEach((pt,ptIdx)=>{
          const oppPt=(md[oppTk]||[])[ptIdx]||{};
          BKS.forEach(b=>{
            // Count runs and deaths for this team
            (pt[b]||[]).forEach(mv=>{
              if(mv.sym&&mv.sym!=='_'){
                bkAll[b].runs++;
                if(name&&teamStats[name]) teamStats[name][b].runs++;
              }
              if(mv.sym&&mv.sym.startsWith('O')){
                bkAll[b].deaths++;
                if(name&&teamStats[name]) teamStats[name][b].deaths++;
              }
            });
            // Kills = number of deaths the opponent had in this same bunker this point
            const oppDeaths=(oppPt[b]||[]).filter(mv=>mv.sym&&mv.sym.startsWith('O')).length;
            if(oppDeaths>0){
              bkAll[b].kills+=oppDeaths;
              if(name&&teamStats[name]) teamStats[name][b].kills+=oppDeaths;
            }
            // Opponent runs at this bunker (denominator for kill %)
            const oppRunCount=(oppPt[b]||[]).filter(mv=>mv.sym&&mv.sym!=='_').length;
            if(oppRunCount>0){
              bkAll[b].oppRuns+=oppRunCount;
              if(name&&teamStats[name]) teamStats[name][b].oppRuns+=oppRunCount;
            }
          });
        });
      });
    });
  });

  div.innerHTML='<h2>Event Stats \u2014 All Matches</h2>';
  div.appendChild(makeStatsTbl(bkAll, true));
  div.innerHTML+='<h2 style="margin-top:20px">Team Stats</h2>';
  TEAMS.forEach(team=>{
    const h3=document.createElement('h3');h3.textContent=team;div.appendChild(h3);
    div.appendChild(makeStatsTbl(teamStats[team], false));
  });
  panel.appendChild(div);
}

function makeStatsTbl(bkData, killsOnly){
  const tbl=document.createElement('table');tbl.className='stats-tbl';
  const hdr=document.createElement('tr');
  const headers=killsOnly
    ?['Bunker','Shape','Bunkers Off Break','Kills Off Break','Kill %']
    :['Bunker','Shape','Bunkers Off Break','Deaths Off Break','Death %','Kills Off Break','Kill %'];
  headers.forEach(h=>{const th=document.createElement('th');th.textContent=h;hdr.appendChild(th);});
  tbl.appendChild(hdr);
  let totRuns=0,totDeaths=0,totKills=0;
  BKS.forEach((b,i)=>{
    const s=bkData[b]||{runs:0,deaths:0,kills:0,oppRuns:0};
    totRuns+=s.runs;totDeaths+=s.deaths;totKills+=s.kills;
    const deathPct=s.runs>0?(s.deaths/s.runs*100).toFixed(0)+'%':'\u2014';
    const killPct=s.oppRuns>0?(s.kills/s.oppRuns*100).toFixed(0)+'%':'\u2014';
    const tr=document.createElement('tr');
    const vals=killsOnly
      ?[b,SHAPES[i]||'',s.runs,s.kills,killPct]
      :[b,SHAPES[i]||'',s.runs,s.deaths,deathPct,s.kills,killPct];
    vals.forEach(v=>{const td=document.createElement('td');td.textContent=v;tr.appendChild(td);});
    tbl.appendChild(tr);
  });
  let totOppRuns=0;
  BKS.forEach(b=>{totOppRuns+=(bkData[b]||{oppRuns:0}).oppRuns;});
  const totDeathPct=totRuns>0?(totDeaths/totRuns*100).toFixed(0)+'%':'\u2014';
  const totKillPct=totOppRuns>0?(totKills/totOppRuns*100).toFixed(0)+'%':'\u2014';
  const totTr=document.createElement('tr');totTr.className='tot';
  const totVals=killsOnly
    ?['TOTAL','',totRuns,totKills,totKillPct]
    :['TOTAL','',totRuns,totDeaths,totDeathPct,totKills,totKillPct];
  totVals.forEach(v=>{const td=document.createElement('td');td.textContent=v;totTr.appendChild(td);});
  tbl.appendChild(totTr);
  return tbl;
}
